front:
  text: 道德真經傳卷之二必二
  hash: sha256:c403b04b19d767910bc7435bfa485119a509795940132c4e45423fe924335b42
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0068_HFL_002-001a, image: hfl/0368/0368-056.png}
body:
  text: 吳郡陸希聲傳經孔德之容唯道是從道之為物惟恍惟惚惚兮恍兮其中有象恍兮惚兮其中有物窈兮冥兮其中有精其精甚具其中有信自古及今其名不去以閲衆甫吾何以知衆甫之然哉以此傳夫虛空其德以容物者唯真精之道是從事乎然道之為物也恍兮若有惚兮若無不可得而定言之何者謂其寂寥無形不可為有而兆見萬象謂其千變萬化卒歸於無物雖恍恍惚惚有無不定窈窈冥冥陰陽不側而精真之信存乎其間夫純粹謂之精自然謂之真至誠謂之信故至誠為之用粹精謂之體體用玄合則謂之自然所謂道法自然也吾何以知其自然之真哉以其上自往古下及來今道之為名常在不去耳以其常在不去是故能閲衆甫衆甫者謂觀閲衆物之某甫者耳吾何以知衆物之名可閲乎以此衆物之名非常名故其名隨世而遷滅唯道之常名不去故能閲可名之名耳夫唯知道之名者乃可以撫運應務雖萬物日作於前而我故無為而治也經曲則全枉則直窪則盈弊則新少則得多則惑是以聖人抱一為天下式不自見故明不自是故彰不自伐故有功不自矜故長夫唯不爭故天下莫能與之爭古之所謂曲則全者豈虛言哉故誠全而歸之傳曲成而不遺則事全枉己以伸物則理直少其欲則事自復故窪則盈靜其濁則理自清故弊則新事歸於理故少則得理乖於事故多則惑聖人知道之紀抱道之子以理會事以事會理事理冥會故可以為天下法則也不自見而弊人則事自明不自是而非人則理自彰不自伐其才則事歸於實故治有功不自矜其能則理得其當故道可長夫唯順道之理不與物爭則天下之事莫不從己故能曲成萬物而不遺微隱乃古之所謂曲則全者豈徒言哉誠能曲而成之則天下全而歸之矣經希言自然飄風不終朝驟雨不終日孰為此者天地天地尚不能久而况於人乎故從事於道者道者同於道德者同於德失者同於失同於道者道亦得之同於德者德亦得之同於失者失亦得之故信不足有不信傳老氏將行不言之教以契自然之理故標而目之經曰聽之不聞名曰希然則希言猶不言也仲尼曰天何言哉四時行焉百物生焉又曰天不言而信此天道之自然也夫自然之理道之常也若四時之運天地之常是以能恆久不已終則復始夫飄風暴雨非天地之常也是以其發作也勃焉其霽止也忽焉夫以天地之廣大猶不能久為此則况於人世其能久於非常乎道德既隱仁義不行曲禮煩刑不得已而為之耳而惑者不能知禮以時為大刑期於無刑之指乃欲執其一方謂可行於百世斯過矣噫飄風暴雨有時而息四時之常未始有極自然之理不可易也故從事於道體道者也法乎自然不失常道故道亦得之則同於道矣從事於德用德者也雖失常道未失常德故德亦得之則同於德矣從事於失者既失於道德又失於仁義故失亦得之則同於失矣記曰為善不同同歸於治為惡不同同歸於亂蓋近是矣於乎信不足有不信斯不得已而為之苟得已而猶為之誠亦惑之甚也經跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長其於道也曰餘食贅行物或惡之故有道者不處傳跂於利者不可以立於常道跨於欲者不可以行於常名欲利之本不忘而曰我可以為治無由也故自見而蔽人則事不明自是而非人則理不彰自伐其才則治無功自矜其能則道不長此四者與跂跨同病皆不足以致治以道論之若棄餘之食不足致飽負贅之行亦孔之醜凡物猶或惡之有道者焉可以處也經有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以為天下母吾不知其名字之曰道强為之名曰大大曰逝逝曰遠遠曰反故道大天大地大王亦大故域中有四大而王居其一焉人法地地法天天法道道法自然傳易曰易有太極是生兩儀則知混成之物生於天地之先也寂兮無兆獨立於萬化之外而其體不改寥兮無狀周行於萬物之內而其用不殆故能生成品類為萬事之主中庸曰其為物也不二則其生物也不測是以太極為大衍之始混成為天下之母焉其體不可以名得故不知其名其用不可謂無名故字之曰道夫字因名立名因用生既與之為字則知其有名矣尋其名未知所謂究其用見其極大因强名其用謂之為大焉於其用則名為大矣於其體則實已逝矣名去實其逺乎曰其去不遠在知其反以名反實以事反理大施於家國小施於身心不能反躬則天理滅矣故記曰道不遠人人自遠道而逺人不可以為道又曰道也者不可斯須離可離非道故始所謂有物混成先天地生者無名之道也末所謂逝曰遠逺曰反者有名之道也故舉域中之四大而王者居其一焉以明王者參天地之道而贊萬物之化育也於乎域中之云者明道非六合之外也故為人之主者必法地之靜以為體能靜矣然後法天之動以為用能動矣然後法道之無為無不為既能無為無不為矣然後能法自然而然而天下莫知所以然也經重為輕根靜為躁君是以君子終日行不離輜重雖有榮觀燕處超然奈何萬乘之主而以身輕天下輕則失本躁則失君傳夫物藝藝各復歸其根故重能為輕之本也天下之動貞夫一故靜能為躁之主也夫行邁之人終日靡靡然而未嘗逺離其輜車之重載者以衣食之資所在也苟遠而棄之則必委困於道路矣是以君子之心常志於道雖外有紛華盛麗榮觀之娛而內常安處貞素超然不滯此以重為本以靜為主之術也夫所謂萬乘之君以天下為重故也如之何輕用其身不顧天下是猶逺行之人棄其輜重則危殆之機立可待矣夫民惟邦本本固邦寧百王之常道也撫我則后虐我則讎天下之常情也苟為人之主者輕用其身縱欲無已虐用其民不顧天下則天下之民相率而去之矣不惟率而去之且將從而戕之矣故老氏惻然憫之反覆興歎曰治身心者輕則失於歸根躁則失於貞一治天下者輕則失其寧邦之本躁則失其法地之君於平萬乘之主安可不重且靜哉經善行者無轍迹善言者無瑕謫善計者不用籌算善閉者無關鍵而不可開善結者無繩約而不可解是以聖人常善救人故無棄人常善救物故無棄物是謂襲明故善人不善人之師不善人善人之資不貴其師不愛其資雖知大迷是謂要妙傳善行者以道道大則德廣故無軌轍可踵迹善言者以名名正則實得故無瑕類可指謫善計者以度度明則數簡故不用籌策而能為巧曆善閉者塞其兊則心不生故無關鍵而不可闢善結者結以信則心不離故無繩約而不可釋故記曰墟墓之間未施哀於民民哀社稷宗廟之間未施敬於民而民敬殷人作誓而民始叛周人作會而民始疑苟無忠信誠慤之心以涖之雖固結之民其不解乎是以此五善者皆聖人善救之要也夫人之不善何棄之有乎故立天子置三公將以教之也善者吾善之不善者吾亦善之是以教無棄人用無棄物斯乃密用知常之術故謂之襲明焉何者夫世之所貴者莫如師世之所愛者莫如資然而善人所以為不善人之師者正以不善人為善人之資也苟無不善人為之資則善人亦無以為其師矣噫天下皆知善之為善斯不善矣天下皆不知善之為善斯盡善矣今不貴其師者不欲就衆人之所善而彰彼不善不愛其資者不欲因他人之不善而成己之善也雖知此不貴愛師資之言大與當世迷謬然其實為善救之術乃要約之妙用也經知其雄守其雌為天下溪為天下溪常德不離復歸於嬰兒知其白守其黑為天下式為天下式常德不忒復歸於無極知其榮守其辱為天下谷為天下谷常德乃足復歸於朴朴散則為器聖人用之則為官長故大制不割傳夫天地之間萬物之用雄强而雌弱牡動而牝靜至於尊卑先後莫不如此老氏深原物理法而為術知弱勝於强故以弱為用知靜勝於動故以靜為主是以後其身而身先卑其道而道尊故處前而民不厭居上而民不重是故知雄强之不可久而以雌弱自守則可以為天下溪矣夫溪者以卑為用也夫唯能用其卑則常德不去離德不去離乃可與道期故能復歸於嬰兒泊然若無知唯能無知則其心明白雖知其明白而守以玄默故可以為天下式所謂式者可法而則者也夫唯可法則故常德不差忒德不差忒則與道相得故能復歸於無極而深不可識雖不可識則暗然日彰故其道顯榮雖知其榮顯而守以溷辱故能為天下谷谷者體實而用虛者也唯體實而用虛則常德乃充足德既充足則可以復歸於無名之朴亦將不欲於不欲終乎大道廢而有仁義大朴散而為成器聖人能用其器故可以為群材之帥夫唯大道不器故能用此成器大制不割故能宰此群物若未冥於道而欲用天下之器見制於物而欲宰天下之材吾必見其殆已記曰利與義智與仁霸王之器也用之者得不以斯道乎經將欲取天下而為之吾見其不得已天下神器不可為也為者敗之執者失之故物或行或隨或詬或吹或强或羸或載或隳是以聖人去甚去奢去泰傳夫天下者天下之天下非聖人之天下也故堯不能以天下與舜禹不能以天下與啓此乃天下與舜與啓故堯禹亦因而與之耳若天下不與欲强取而為之吾未見其有得之者而况能執而有之者哉是何也天下者猶神明之大器非人智力可取而為之苟非天下所與强取為之其功必敗苟非天下樂推强執有之其身必失何者夫物有行之在前則有隨之於後者矣有煦之為溫則有吹之以寒者矣有用壯為强則有用力而挫之者矣有因栽而培則有因闕而墮之者矣是故有强取而為之則有强奪而有之者矣是以聖人知天下不可以智力取故以無事取天下道成德著而天下與之是以天下樂推而不厭聖人無為而致治故去甚者不强取也去奢者不執有也去泰者不辭讓也易曰亢龍有悔亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎亦其指也經以道佐人主者不以兵强天下其事好還師之所處荆棘生焉大軍之後必有凶年故善者果而已不敢以取强果而勿矜果而勿伐果而勿憍果而不得已是果而勿强物壯則老是謂不道不道早已傳夫以道輔人主者當以德服人心不以甲兵之力取强於天下何者取强於人人必惡之天下之人惡之則天下之兵加之矣故我取强於人人亦取勝於我出乎己者反乎己是以其事好還復焉凡師旅所居農耕必廢則荆棘生於田畝杼軸空於都鄙重以殺害生民感傷和氣則必水旱洊臻凶荒仍歲矣人事既如彼天意又如此然則兵可去乎曰天生五材廢一不可誰能去兵兵不可去用之有道故古之善用兵者果而已矣不以取强何謂果哉勿矜其能勿伐其功勿憍其心雖果於三者須不得已而後用復果於濟雖而不止猶不敢以取强焉則是果而勿强矣夫矜其能則好戰好戰則不能安民伐其功則易爭易爭則不能和衆憍其心則生事生事則不能阜財三果不存七德盡廢好勝弗已怙力取强亡之道也於乎物壯必老兵强必敗自然之勢可不戒哉且道以弱為用而兵以强取勝斯不合於道也明矣不遠而復故無祇悔不道早已則無大敗易曰迷復凶有災眚用行師終有大敗以其國君凶至於十年不克征不知早已之謂也經夫佳兵者不祥之器物或惡之故有道者不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬淡為上勝而不美而美之者是樂殺人夫樂殺人者不可得志於天下吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之殺人衆多以悲哀泣之戰勝則以喪禮處之傳夫佳尚兵謀之人非祥善之材器凡物猶或惡其意有道者豈可安其事哉何者天地之道左陽而右陰陽主德主生陰主刑主殺故君子平居則以有德者居左斯貴左也即戎則以有勇者為右斯貴右也君子以好生為德武人以多殺為功故知兵者是不祥之器用非君子之器用也若夫蠻夷猾夏寇賊姦宄則不得已而用之然未嘗為起戎之首故曰不敢為主而為客不敢進寸而退尺以恬於見利淡於欲勝為上不以敢於勇進嗜於多殺為貴善在不戰而屈人不以戰勝而為美何也凡戰以多殺人為勝美之者是樂殺人樂殺人者人亦將樂殺之豈唯人將殺之天亦將殺之何哉生者天地之大德也樂殺人者逆天德若使樂殺人者得志於天下則天下之人幾盡矣天必不助而況於人乎且吉事則拱而尚左凶事則拱而尚右偏將軍者兵之佐故居於左上將軍者兵之主故居於右所以居於右者居其上勢也居上勢者尚於右是以喪禮處之也夫戰而勝者殺人多也殺人多者必以悲哀泣之是戰而勝者則以喪禮處之也前言不祥之器後言喪禮處之皆再歎其辭惡殺人之甚也經道常無名朴雖小天下不敢臣侯王若能守萬物將自賔天地相合以降甘露人莫之令而自均傳道之所以能常者無名之體也夫無名之體亦謂之無名之朴其體甚微眇其道甚尊大故為天地之始而天下莫之敢臣也侯王能守此無名之朴則萬物莫不賔服故山高則牂羊至矣水深則蛟龍至矣山之不高水之不深神物且猶不至而况於衆物哉夫天地中和之氣合則膏露降於萬物萬物均被其澤莫有使之而然侯王能法天地之中和以守冲用之道則德澤普於天下天下莫知所以然所謂侯王若能守萬物將自賔也經始制有名名亦既有夫亦將知止知止所以不殆譬道之在天下猶川谷之與江海傳所謂始者即無名也夫唯無名之體故能制有名之用亦既有名名將遊矣故亦將知止止其所也遊止其所名止其實事止其理知止而止故不至危殆然則所謂名止其實亦實其名也故循名而督實按實而定名名實相當則國治名實不當則國亂名生於實實生於名名實相生反相為情故有道之君操契以責名名者天下之網聖人之符張天下之網用聖人之符則萬物之情無所逃矣故審其名以復其實考其實以正其名則是非之見若白黑故判為兩合為一是非隨名實賞罰隨是非是以見其象致其形循其理正其名故曰名自命則事自定也因名命之隨事正之故堯之治天下也以名其名正而天下治桀之治天下也亦以名其名倚而天下亂故名者聖人之所重也仲尼曰必也正名乎名不正則人主憂勞人主憂勞則官職煩亂白之顧益黑求之而愈不得名正則人主無憂勞無憂勞則不役其耳目之主而百度惟貞因形而任不制於物無為而治清靜以公神通乎六合意觀乎無窮所謂知止不殆也夫江海者川谷之所歸無名者有名之所止譬諸天下之事其歸於道如此經知人者智自知者明勝人者有力自勝者强知足者富强行者有志不失其所者久死而不亡者壽傳知出於外謂之智如日火之外光知反於內謂之明如金水之內景用弱以勝人之暴為有道之力守柔以自勝其躁為有德之强知足於利欲者不亡其大業故謂之富强行於仁義者可至於盛德故謂之有志動而不失其所恆故可久身死而道不亡故為壽經大道泛兮其可左右萬物恃之以生而不辭功成而不居有愛養萬物而不為主常無欲可名於小萬物歸之不為主可名於大是以聖人終不為大故能成其大傳大道之用其猶鬼神之德乎泛泛乎可在乎左可在乎右洋洋乎若在乎上若在其前後為萬物之母故恃之以生與天地合德故其功易成以其親之至故不謝厥德以其大之極故不稱有功慈育萬類長而不宰故常無欲以觀其妙則可以名其朴為小萬物歸之不為其尊主若川谷之與江海則可以名其道為大夫川谷之赴江海受之而不厭是未嘗自尊天下皆歸聖人聖人容之而不倦是終不為大聖人守無名之小朴終不自以為大所以為萬物之所賔卒能成其大經執大象天下往往而不害安平泰樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既傳大象者道也夫能執古之道以御今之有則天下萬物皆歸而往之矣夫聖人視民如赤子唯恐其傷而況有事傷之乎未嘗有以傷之則歸而往之者莫有受其傷矣莫受其傷則天下皆安其夷泰矣夫樂可以悅耳餌可以適口則旅人為之留連行客為之歡饜雖即時有感然非其所安不可久處故易曰鳥焚其巢旅人先笑後號咷也夫執大象者則不然不以欲樂示於人故言之出口淡乎其無味教之入心泊乎其不美希乎夷乎雖不足以聽視然用之不窮酌之不竭彌乎千萬年而不可以既經將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明柔弱勝剛强魚不可脫於淵國之利器不可以示人傳夫聖人之淵奧莫妙於權實實以順常為體權以反經為用權所以濟實實所以行權權實雖殊其歸一揆老氏既以實導人立知常之教又以權濟物明若反之言易所謂曲成萬物而不遺範圍天地而不過者也夫欲除强梁覆昏暴者必因其利欲之心以行歙張之術術之用曰彼利欲之心方盛必且足之令張喜其足則獲其情然可歙之以正在易明夷六四入于左腹獲明夷之心不出門庭是也夫足之令足所以極其張也張則侈心愈益故為衆之所歙也此術甚微而明聖人所以密用也至於將弱其志氣者必且强其嗜欲甚愛則大費欲極則志衰小用之於身心大用之於天下廢興與奪覆却相資斯自然之理以反為合者也經曰反者道之動弱者道之用能以柔弱制剛强是用而反者也用而反者實能制權也易曰巽以行權又曰巽稱而穩夫巽之為象風也風能應四時撓萬物而萬物莫見其形權能乘天機適世變而人莫知其用夫巽之為義順也巽順可以行權權行則能制物故柔弱可以制剛强則義甚彰而用甚隱矣何以明之昔者文王二天下之三而猶詘伏殷紂乃獻漆沮之地請去炮烙之刑夫紂之貪心方熾故文王請獻之地是足之令張也紂既得地而喜故文王請去其刑是歙之以正此文王之權也昔武王觀兵盟津曰紂之惡未極於是還師二年然後興牧野之役夫遺於盟津是足其張令極也興於牧野是致其衆之所歙此武王之權也昔文王以文柔之道雖念殷人不勝其酷需盡去紂而後受之此文王之實也昔武王以剛武之德遽痛殷人之不勝其虐遂亟誅紂而後取之此武王之實也伯夷叔齊輔文王之實正武王之權謂以臣伐君不可以訓將以整三綱於後世故相率而棄武王餓死於首陽太公相武王之權反文王之實謂誅獨夫紂天下乃定將以拯兆民於當代故鷹揚而從武王肆伐于大商周公召公成文武之業將欲密救亂之權顯治安之實於是休牛放馬倒載干戈問洪範於箕子遷頑民於洛邑制禮作樂偃武修文流二南之化致八百之祚此又以權反實之大者也易曰一闔一闢謂之變往來不窮謂之通此皆微明之㫖以權實相濟者也於乎聖人行權所以合乎道小人竊權所以濟乎姦魚脫於淵則不可行權離於實則不可用夫權之為物國家之利器也必深藏之密用之不可顯示於人懼其竊以為亂也故孔子曰可與適道未可與立可與立未可與權在易乾之九四曰或躍在淵無咎子曰上下無常非為邪也進退無恆非離群也君子進德修業欲及時也故無咎坤之六四曰括囊無咎無譽子曰天地變化草木蕃天地閉賢人隱括囊無咎蓋言謹也愼不害也然則權之為用聖人所難且愼也可不謹乎可不謹乎經道常無為而無不為侯王若能守萬物將自化化而欲作吾將鎮之以無名之朴無名之朴亦將不欲不欲以靜天下將自正傳道之所以為常者以其體無名故無為用有名故無不為侯王能守此始與母之術則萬物之理得而天下之事正所謂我無為而民自化也德化既淳天下清靜苟利欲之情將有萌兆吾必以此大道之質奠而正之使無得動矣夫上德無為而無以為則同於道矣下德為之而有以為則同於德矣得於德者必失於道故有無為之心者必有無為之迹後世將尋其迹而忘其本故為無為而至有為故云無名之朴亦將不欲者將使心迹兼忘則至於玄之又玄矣夫能心迹兼忘事理玄會則天下各正其性命而無纍於物之迹焉首篇以常道為體常名為用而極之於重玄此篇以無為為體無不為為用而統之以兼忘始末相貫而盡其體用也道德真經傳卷之二
