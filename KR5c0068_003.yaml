body:
  text: 吳郡陸希聲傳經上德不德是以有德下德不失德是以無德上德無為而無以為下德為之而有以為上仁為之而無以為上義為之而有以為上禮為之而莫之應則攘臂而仍之故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首前識者道之華而愚之始是以大丈夫處其厚不處其薄居其實不居其華故去彼取此傳上德合道不以德稱無以而為故有常德下德失道而同於德有以而為故無常德上德之用法乎自然故無以為而無為也下德之用法乎無為故有以為而為之也夫仁者兼愛皆有為而為能無以仁為功者上也義者禁非亦有為而為能有以義為利者上也何則若以仁為功則滯於為仁矣若不以義為利則徇於非義矣夫禮之上者所以辨上下定民志至於陳玉帛尚往來斯禮之末節也今禮敬於人人未之答彼誠失禮之微者我乃艴然變色奮肱而引之則失禮復甚於彼矣夫禮所以防爭失之於末則反以起爭斯乃世俗之常情不達禮之大本故也老氏舉其失禮之甚譏其起爭之由將使人反禮之本復歸於太一者耳記曰愛人而不親則反其仁禮人而不答則反其敬故克己復禮而不尤於人易曰謙以制禮又曰謙德之柄苟能執謙之柄復禮之始則指撝而無不利安有攘仍之失哉且上德無為自然合道失於上德法乎無為故曰失道而後德耳夫法乎無為德業著矣有為而為仁功見矣裁而利之上義明矣制而防之上禮立矣故曰失德而後仁失仁而後義失義而後禮也夫失於彼者得於此此天下之常理也故忠信之質衰於中而禍亂之機兆則制禮以防其亂故禮居亂之首大道之華發於外而愚昧之情或則崇智以導其愚故智為愚之始也前識者智也智為先見之眀而照於未形之理者也然則仁義禮智皆聖人適時之用所以與世汙隆隨時升降者耳故執古御今則以道德為之本禮智為之末化今復古則以禮制為其始道德為其終所謂損之又損之以至於無為者也夫豢豕為酒非以為禍而酒之流禍生焉仁義禮智非以為亂而治之弊亂至焉惑者不知利欲之為亂乃欲歸罪聖智因謂絶而棄之則可以復於上古之治一何過哉一何過哉故曰論禮於淳朴之代非狂則悖忘禮於澆漓之日非愚則誣在於尋流還源去末歸本正禮義以反仁德用有名而體無名則自然之道不逺而復矣所謂大丈夫者且將斷此而不疑安處於道德之本不滯於禮智之末者耳何為其然乎作法於治其弊猶亂作法於亂弊將若何故去彼華薄取此厚實斯乃執古御今之深旨也於乎禮亦有之祭天一獻貴質也器用陶匏貴素也明酒之用而玄酒之尚管簞之安而藁秸之設皆貴本也安可忽之哉經昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下貞其致之一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貞而貴高將恐蹶故貴必以賤為本高必以下為基是以侯王自謂孤寡不穀此其以賤為本也非乎故致數輿無輿不欲琭琭如玉珞珞如石傳夫一者道之子物之始也能抱其子復其始則萬物莫不遂其生之理矣雖天道之與神明地道之與山谷莫不以得一之故而能清靈寧盈耳易曰天下之動貞夫一故侯王得之則為天下貞所以致之其道一也然唯其致之不可恃之故戒其無以此為也苟恃其清靈寧盈則必將裂發歇竭矣於乎萬物恃其生天理必滅侯王恃其貞貴高必蹶特加貴高之言將戒侯王之深旨也亦既戒之而又演之曰其所以得貴為王侯必以賤者為根本也其所以高居大位必以下民為基址也至於孤寡不穀皆下賤之稱也而侯王以此自稱者此以下賤為本之謂也窮極其致何以明之夫士農工商具於民然後有國焉輪轅箱軸備於用然後有輿焉今指輿而數之則皆輪轅箱軸耳不見有輿也指國而數之則士農工商耳不見有國也然則士農工商國之賤下者也國之所以存以賤下為本耳故侯王當以貴自戒不欲琭琭然如玉之貴異當以賤下為本故宜珞珞然如石之凡賤也經反者道之動弱者道之用天下之物生於有有生於無傳夫權也者以反為動而合於正者也實也者以弱為用而制於強者也天下之物皆生於有形有形之物必生於無形天下之事皆生於有兆有兆之事必生於無兆故知反之為動必生於弱之為用則動微之幾必生於靜冥之理然則幾生於理終歸於理權生於實終反於實此皆道之通變覆却相濟者也經上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道建言有之明道若昧進道若退夷道若類上德若谷大白若辱廣德若不足建德若偷質真若渝大方無隅大器晚成大音希聲大象無形道隱無名夫唯道善貸且成傳易曰形而上者謂之道道也者通乎形外者也形而下者謂之器器也者止乎形內者也上士知微知彰通乎形外故聞道而信則勤行之中士在微彰之際處道器之間故聞道而疑信相半故若存若亡下士知彰而不知微止乎形內故聞道則大笑之不唯笑之且將非之矣夫道也者微妙玄通深不可識苟不為下士所非笑則不足以為真精之道矣然則為下士所非笑者豈不以立言有云乎夫體道者與曰月合其貞明而其光不耀斯明道若昧也與天地合其易簡而其用不可為典要斯夷道若纇也與四時合其運行而其動必反於玄妙斯進道若退也常處卑下而終不可渝斯上德若谷也常居溷濁而終不可涅斯大白若辱也衣被天下而不有其仁斯廣德若不足也生畜萬物而不顯其功斯建德若偷也復其性以御其情斯質真若渝也正乎內而行乎外斯大方無隅也以若拙之匠陶甄天下而不為近功斯大器晚成也以不言之教鼓動萬物而不事小説斯大音希聲也事無事莫覩其用斯大象無形也為無為莫識其體斯道隱無名也夫唯善濟貸於萬物而不責其報是以萬物受其生成而不知其德故下士聞此道而笑之不信其能若此耳經道生一一生二二生三三生萬物萬物負陰而抱陽沖氣以為和人之所惡唯孤寡不穀而王公以自稱故物或損之而益或益之而損人之所教亦我義教之強梁者不得其死吾將以為教父天下之至柔馳騁天下之至堅無有入於無間吾是以知無為之有益不言之教無為之益天下希及之傳夫真精之體生妙物之用氣形既具萬物生焉夫陰陽相交而為沖氣沖氣運化而成萬物然萬物之生也莫不背陰而向陽沖氣行其中所以和順其生理也聖人立教之指必原夫天地之道窮萬物之理然後知人之生也亦以沖氣為主焉何以明之夫人受天地之中以生所謂命也其始有精爽謂之魂魄魄者陰也魂者陽也陰陽化淳而沖和之氣行乎其間所以成形神也故沖和之氣全則神與形相得神與形相得則為生沖和之氣散則神與形相離神與形相離則為死死者不可復生散者不可復全故必能養其浩然之氣然後可以合於自然之道易不云乎天地之大德曰生生也者蓋聖人之所重也聖人之所以重其生者何將以行道也道也者域中之所尊也雖大包天地細入毫芒要而言之在於身心而已是以為道之人務治身心之要治身心之要在處衆人之所惡然則孤寡不穀皆衆人之所惡而王公自以為稱者將以損身心之強梁而求益於道德者也在易損之為善莫善於懲忿窒欲懲忿窒欲則其心日明其心日明則可以益於理矣為益之美莫美於遷善改過遷善改過則其身日正其身日正則可以損其事矣所謂物或損之而益或益之而損也夫人之所以教教人日益我亦教人教人日損故損之又損之以至於無為也夫道以柔弱為用不與物爭故物莫能與之爭所謂不損益之者也強梁者以暴害物物亦害之故不得盡其生理所謂莫益之或擊之也吾知彼強梁為萬物所惡故以此柔弱為衆教之父何以明之夫水以至柔為用而穿於石之至堅氣以無形為體而入於物之無間是知有為之教本於事以剛健為主無為之教本於理以柔順為先吾見水之攻至堅氣之入無間是以知無為之有益有為之有損也夫行多言之教滯有為之事則有為之有損也行不言之教通無為之理則無為之有益也多言之教有為之損舉天下皆是也不言之教無為之益則天下希及之於乎知我者希則我者貴信矣經名與身孰親身與貨孰多得與亡孰病是故甚愛必大費多藏必厚亡知足不辱知止不殆可以長久傳夫名者立身之表也有其實則身見尊於當時名亦揚於後世苟以矯激為之不足施於事實則名雖聞人身必棄於有道矣貨者發身之資也得所用則身以好施見重貨不為己而積苟以貪冒得之不能散於仁惠則貨雖滿堂身必薄於有德矣得竊名黷貨之譏而亡其修身約己之道二者孰為病乎故甚愛名者必生偽則大傷其實矣多藏貨者必招盜則厚失其資矣故知足則不貪貨知止則不貪名不貪貨則不辱不貪名則不殆夫唯如此則其名可以長有其貨可以久守矣經大成若缺其用不弊大盈若沖其用不窮大直若屈大巧若拙大辨若訥躁勝寒靜勝熱清靜為天下正傳夫聖人道濟天下而猶慮一物不得其所則成衆務而不弊矣德充四海而不敢介然自矜於懷則應萬機而不窮矣行至易之道而不徑庭因自成之器而不雕鎸陳至當之理而不文飾夫如此則物遂其性人盡其能天下之事不勞而自定矣究其所以然者皆自然而勝耳猶躁作者勝祁寒靜正者勝祁暑非有心於寒暑而寒暑不能侵之故我無為而民自化我好靜而民自正天下之動貞夫一故清靜可以為天下正也經天下有道却走馬以糞天下無道戎馬生於郊罪莫大於可欲禍莫大於不知足咎莫大於欲得故知足之足常足矣傳夫天下有道之世天子則守在四夷諸侯則守在鄰國雖有甲兵無所用雖有健馬無所乘百姓順其教化復於農桑闢污萊以藝樹糞田疇而播殖故民咸安其土而敦其親矣天下無道之時天子則外攘四夷諸侯則外侵鄰國故兵甲動於境內戎馬馳於四郊百姓困於力役失其本業桑梓盡於樵薪荆棘生於隴畝民咸去其鄉而叛其君矣於乎無道之君毒痛天下原其所以其惡有三心見可欲非理而求故罪莫大焉求而不已必害於人故禍莫大焉欲而必得其心愈熾故咎莫重焉然自非聖人不能無欲欲則不能無求求而不知足禍之甚者也於乎未有多求而多得之者故求而知足者其求必寡則易供故其求常足矣經不出户而知天下不窺牖而見天道其出彌遠其知彌少是以聖人不行而知不見而名不為而成傳夫聖人之為治也必推其身心以及於天下故當食而恩天下之飢當衣而思天下之寒愛其親以及天下之老愛其子以及天下之幼夫如此不俟出户而天下可知矣夫聖人之治也必反諸身心以合於天道故己好生則知天道之生萬物也己成務則知天道之成四時也己樂善則知天道之與善人也天以懸象示其道聖人亦以身心合於道又安用窺牖而後見天道哉夫不能反推於身心而囂囂然自以天下為己任勞其神苦其形孜孜矻矻有為於天下之事者吾見其不能為治矣何者夫天下之事一日萬機不能秉要執本而務治其末則形神勞矣夫神大勞則竭形大勞則弊形神俱勞則危殆及之矣徒勤勞於末流竟不得其萬一是以其出彌逺其知彌少故記曰欲治天下先治其國欲治其國先治其家欲治其家先治其身欲治其身先治其心欲治其心先誠其意故君子不誠無物皆反推於身心之謂也夫不行天下而能察知人情不見天象而能名命天道則不為勤勞之事而能成乎至治反推身心故也孔子曰唯天為大唯堯則之又曰無為而治者其舜也歟此之謂也經為學曰益為道日損損之又損之以至於無為無為而無不為取天下常以無事及其有事不足以取天下傳夫為學者博聞多識以通於理故日益為道者秉要執本以簡於事故日損夫理明則事定故學之日益實資道之日損也夫濁於亂政靜之可以徐清故損之在漸不可頓去則損之又損之也安於弊俗動之可以徐生故損之至乎無為則能無不為矣夫有為者緣人情而作之法制故有事有事則民勞民勞則叛之無為者因物性而輔之自然故無事無事則民逸民逸則歸之夫聖人之心常慮一物失其所將欲救弊亂之要在於取天下人之心取天下人之心在使其自來歸之耳故為無為事無事俗化清靜則民皆樂推而不厭若有為有事政煩民勞則百姓望而畏之故不足以取天下之心也經聖人無常心以百姓心為心善者吾善之不善者吾亦善之得善矣信者吾信之不信者吾亦信之得信矣聖人在天下惵惵為天下渾其心百姓皆注其耳目聖人皆孩之傳聖人體道無為物感則應應其所感故無常心然百姓之心常欲安其生而遂其性聖人常使人人得其所欲豈非以百姓心為心乎苟百姓有好善之心聖人亦應之以好善其本善者吾因以善輔之苟有不善之心吾亦因而善待之使感吾善亦化而為善則天下無不善百姓皆得所欲之善矣至於百姓有好信之者吾亦以此化之則百姓皆得所欲之信而天下無不信矣故聖人在天下惵惵然應於物感未嘗少息而其心渾然與天下為一未嘗自有所為故仲尼之所絶者有四謂毋意毋必毋固毋我是以能無可無不可無為無不為故百姓皆注其耳目於聖人若嬰兒之仰慈母聖人視之唯恐其傷也經出生入死生之徒十有三死之徒十有三人之生動之死地亦十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地傳夫生必有死理之常也達生死之理則能安其常苟違其常則越於生理越於生理則陷於死地必矣然則知生有常理不違理以存其生者十中有三人耳知死亦常理不違理以避其死者十中亦三人耳若乃愛其生違理而存之則反失惡其死違理而避之則反得者亦如之何為其然求生之厚越於生理是以動而乖常則之於死地故善攝生者則不然知生有常理則守道抱德而不厚其生知死亦常理則樂天知命而不憂其死生死不能動其心患難不能奪其志則陸行遇摯獸而不驚入軍冒白刃而不讋雖處患難與不遇同何以致其然耶有心害物物亦害之有信及物物亦信之我無心害物故兕虎無所投其爪角有信及人故甲兵無所容其鋒刃是知生理不存於中則死地不見於前仲尼曰忠信則水火可蹈蓋近之矣經道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴夫莫之爵而常自然故道生之畜之長之育之亭之毒之養之覆之生而不有為而不恃長而不宰是謂玄德傳夫物生而後畜畜而後形形而後成其所由生者道也其所以畜者德也形其材者事也成其用者勢也萬物以能生故尊道以能畜故貴德道德以生畜之故自然為萬物所仰豈有授之爵位而後見尊貴哉然道者真精之體德者妙物之用體可以兼用用不可以兼體道可以兼德德不可以兼道故稟其精謂之生含其氣謂之畜遂其形謂之長字其材謂之育權其成謂之亭量其用謂之毒保其和謂之養護其傷謂之覆此之謂大道既生之而不執有既為之而不矜恃既長之而不宰制此之謂玄德營魄章言人同於道德今此章言道德同於人是以其辭同而其理通也經天下有始以為天下母既得其母以知其子既知其子復守其母殁身不殆傳天下萬物固有所始始天下者其唯無名乎天下萬物固有所生生萬物者其唯有名乎然則無名為天下之始有名為萬物之母夫無名有名存乎體用用因體生故復以無名為有名之母也故曰天下有始以為天下母即道生一也夫一為道之子道為一之母道謂真精之體一謂妙物之用既得其體以知其用既得其用復守其體體用冥一應感不窮然後可以無為而治故能殁身不殆也經塞其兊閉其門終身不勤開其兊濟其事終身不救見小曰明守柔曰強用其光復歸其明無遺身殃是謂襲常傳兊者嗜欲所之生也門者云為之所由也以性正情則嗜欲之原塞矣以理正事則云為之路閉矣夫如此然後可以無為無不為故終身不復勞也開其源而弗塞則長其嗜欲之情通其路而弗閉則濟其云為之事如此則形神俱勞終身不可救矣知塞兊閉門之術是見於微小也挫嗜欲之鋭解云為之紛是守其柔弱也守柔弱則物不能加可謂強矣見微小則事不能昏可謂明矣明者內景謂體也光者外照謂用也出應於事反歸於理是以用歸體故曰用其光復歸其明也以用歸體則與道合道用柔弱嗜欲不生故能馳騁云為而不為萬物所害若嗜欲不除強梁於事事煩則害理是自貽其災殃故能以見微守柔為用即是密用真常也經使我介然有知行於大道唯施是畏大道甚夷而民好徑朝甚除田甚蕪倉甚虛服文彩帶利劍饜飲食資貨有餘是謂盜夸非道也哉傳老氏言若吾囂然略無知道之心始欲希於當世則唯所行之為務務其苟合於當世也使我介然微有知常之明方將行於大道則唯所施而是畏畏其不合於大道也夫大道之云猶亨衢也亨衢平易無往不達以其大直不患小迂而世人欲速由於捷徑是以崎嶇迷惑不達所趨故聖人病之愼所施教畏其導民於邪路終不合於大道焉噫入其國其政教可知也觀朝闕甚修除墻宇甚雕峻則知其君好土木之功多嬉遊之娛矣觀田野甚荒蕪則知其君好力役奪民時矣觀倉廪甚空虛則知其君好末作廢本業矣觀衣服多文彩則知其君好淫巧蠹女工矣觀佩帶皆利劍則知其君好武勇生國患矣觀飲食常饜飫則知其君好醉飽忘民事矣觀資貨常有餘則知其君好聚斂困民財矣凡此數者皆盜用民力以為夸毗故謂之盜夸盜夸者非有道之治也然則盜用之云陰取之而民不知也所謂唯施是畏其在此乎經善建者不拔善抱者不脫子孫祭祀不輟修之身其德乃真修之家其德乃餘修之鄉其德乃長修之國其德乃豐修之天下其德乃普故以身觀身以家觀家以鄉觀鄉以國觀國以天下觀天下吾何以知天下之然哉以此傳善建者以道鎮國本則深根固蒂而不可挺拔善抱者以德懷民心則無繩約而不可解脫夫如此則子孫享祚長久故祖宗祭祀無輟絶也故修道於身則其德用淳真修道於家則其德行有餘修道於鄉則其德教久長修道於國則其德化豐大修道於天下則其德施周普故以治身之道反觀吾身心身心能體於道則德乃真矣以治家之道反觀吾家人家人能睦於親則德有餘矣以治鄉之道反觀吾鄉黨鄉黨能信於友則德乃長矣以治國之道反觀吾國民國民能遂其生則德乃豐矣以治天下之道反觀吾天下之人天下之人能無欲則德乃普矣吾何以知天下國家以及身心之然哉以此反觀之乃知耳易曰觀我生觀民也其是之謂乎經含德之厚比於赤子毒蟲不螫猛獸不據攫鳥不搏骨弱筋柔而握固未知牝牡之合而脧作精之至終日號而不嗄和之至知和曰常知常曰明益生曰祥心使氣曰強物壯則老是謂不道不道早已傳夫至人性含淳厚情無嗜欲泊然未兆有如赤子赤子者無心害物物亦無心害之故蜂蠆虺蛇經之而不蠹螫攫鳥猛獸遇之而不搏據雖筋骨至弱而拳握甚固雖情欲未萌而陽德自作雖終日啼呼而聲無嘶嗄皆以純精不散和氣常存故能至此耳至人之德神矣又何以異於此乎故能知嬰兒之和柔而法之乃德之常也能知和柔為常德而用之乃心之明也夫生為常理德之大也能順常理福之首也苟厚其生而益其福既失常理必致凶災故益生曰祥也志能動氣氣能動志以心任氣氣盛心強故心使氣曰強也夫物之壯者必至於老心之強者必至於暴道以柔弱為用故強壯者謂之不道知其不道則可早已易曰不遠復無祇悔此之謂也經知者不言言者不知塞其兊閉其門挫其鋭解其紛和其光同其塵是謂玄同故不可得而親亦不可得而疏不可得而利亦不可得而害不可得而貴亦不可得而賤故為天下貴傳知道者以心而不以辨談道者以辨而不以心故大丈夫去彼辨説取此心悟塞其嗜欲之端閉其云為之路挫俗情之鋒鋭解世故之紛糾上和光而不皎下同塵而不昧是謂微妙玄通與物大同者也上交於道而不諂故不可得而親昵下交於器而不瀆故亦不可得而疏隔淡泊無欲故不可得而利誘卑順不爭故亦不可得而陷害處上而不重故不可得而貴寵處卑而不汙故不可得而鄙賤道德自尊非人使然此所以為天下之至貴經以正治國以奇用兵以無事取天下吾何以知其然哉夫天下多忌諱而民彌貧民多利器國家滋昏民多智慧邪事滋起法令滋彰盜賊多有故聖人云我無為而民自化我無事而民自富我好靜而民自正我無欲而民自朴傳夫正名則不濫可以治國矣奇謀則不窮可以用兵矣二者才足救患而已非可久可大者也將欲可久可大者莫過於取天下之心夫唯取天下之心莫過於無事及其有事則不足以取天下之心矣吾何以知其如此哉夫天下有事則多其禁忌避諱將以治萬民也萬民以其有事不得安其業故彌貧百姓有欲則多其利用器具將以助國家也而國家以其有欲不得靜其治故滋昏民多智慧欲以防狡猾狡猾益有以欺之故邪事滋起法令滋彰欲以防姦宄姦宄愈得以取之故盜賊多有此皆不塞其源而務壅其流故其弊愈益而不可止既此有事不足以取天下人之心是知唯無事者則可以取天下之心矣故老氏舉聖人之言云者以示不敢自專其所舉之言蓋三墳之文也老氏為周柱下史遍觀上世之遺書故舉其言以證其必然耳傳序云彌綸黃帝蓋此類也我無為則人遂其生故其俗自化我無事則民復其業故其家自富我好靜則人保天真之性故其事自正我無欲則人絶夸企之情故其質自朴苟有事有欲而望致民於富壽之域吾未見其可也經其政悶悶其民淳淳其政察察其民缺缺禍兮福所倚福兮禍所伏孰知其極其無正耶正復為奇善復為妖民迷其日固以久矣是以聖人方而不割廉而不劌直而不肆光而不耀傳夫有道之君悶悶然以寬大含容為政民皆樂其生而遂其性故淳淳然歸於朴厚無德之君察察然以聰明苛急為政民皆失其業而喪其本故缺缺然至於凋弊則悶悶之政世人為之慢政而其民實樂察察之政世人謂之能政而其民實弊亦猶世之所謂禍者莫不畏惡之以其畏惡之則福立其中矣世之所謂福者莫不喜好之以其喜好之則禍藏其間矣雖禍福相因莫知所極考其善惡豈無正耶夫政寬民淳可謂正道禍中生福可謂善訓而世人之迷其日固久知正道而不遵反為奇邪聞善訓而不信復為妖孽斯至人之所歎也是以聖人以大方為德而無所割正以至廉為行而無所劌傷以大直為心而無所肆訐以天光為用而無所炫曜此所謂悶悶之政豈同於察察之治乎道德真經傳卷之三
