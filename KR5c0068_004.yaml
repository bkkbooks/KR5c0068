body:
  text: 吳郡陸希聲傳經治民事天莫若嗇夫惟嗇是謂早復早復謂之重積德重積德則無不克無不克則莫知其極莫知其極可以有國有國之母可以長久是謂深根固蒂長生久視之道傳夫治民事天之要莫如於嗇嗇也者儉約之至也嗇於事則素約於理則質質以事天則天降休祐所謂誠則能著也素以治民則民躋富壽所謂儉則能廣也夫唯能守質素則速反淳德是以早復也早復者斫雕成朴化澆為淳是謂重積常德重積常德則可以有為故無所不克無所不克則可以無為故莫知終極莫知終極則殁身不殆故可以有國者也有國者所以治民事天之本皆在於嗇故嗇為有國之母焉能守有國之母則其道可長其德可久以為國本則根深而不可拔柢固而不可掘以為國命則生長而不夭絶視久而不昏懵經治大國若烹小鮮以道蒞天下者其鬼不神非其鬼不神其神不傷人非其神不傷人聖人亦不傷人夫兩不相傷故德交歸焉傳夫治萬乘之國若烹膚寸之鮮雖調其水火要在不撓之撓之則魚傷魚傷則糜爛於鼎矣以道蒞天下亦若是已雖和其政教要在不擾之擾之則民傷民傷則潰亂於國矣然則聖人之治天下其要在於不傷人如此則鬼神皆感聖德亦不敢傷於人今舉以道蒞天下乃言其鬼不神者夫利物於明者莫如聖害物於幽者莫如鬼故舉其極暌而求其反合所以究幽明之故也在易睽之上九曰見豕負塗載鬼一車先張之弧後説之弧此之謂也夫不傷之德自聖人始今先言其鬼不神蓋欲反歸於聖人耳夫鬼以害物為神今所以不能害物者以明神之不傷人故鬼不能為神所以不傷人者以聖人不傷人故也夫聖人不傷人故鬼神亦不傷人今既先舉鬼神不傷人故反言聖人亦不傷人夫聖人者豈唯致鬼神不傷人亦使人不傷鬼神人神相依兩不相傷則幽明之感皆歸德於聖人故曰德交歸焉經大國者下流天下之交天下之交牝牝常以靜勝牡以靜為下故大國以下小國則取小國小國而下大國則取大國故或下以取或下而取大國不遇欲兼蓄人小國不過欲入事人兩者各得其所欲故大者宜為下傳大國者衆國之所歸下流者衆流之所會衆流之所會故為天下之交衆國之所歸故為天下之牝牝之為言以卑靜自守而為衆牡所悅者也夫牝之所以常勝於牡者非以其柔且靜復能為物之下乎然則雌靜卑下之術果可以勝躁動強梁者也故大國之君得此術則取小國小國之君得此術則取大國大國下小國是道之動故曰或下以取小國下大國是道之用故曰或下而取大國之意不過欲兼畜小國以成其大小國之意不過欲入事大國以存其小將使小大各得其所願則大國之君宜先下小國小國之君必欣然而入於大國夫如此則真所謂天下之交牝矣夫小國而下大國不過自全而已大國以下小國則天下歸之是以大國宜先下也經道者萬物之奧善人之寶不善人之所保美言可以市尊行可以加人人之不善何棄之有故立天子置三公雖有拱璧以先駟馬不如坐進此道古之所以貴此道者何不日求以得有罪以免耶故為天下貴傳道者廣大包容故為萬物之淵奧善人得道之用若懷其寶不善人賴道以全故為所保護夫美其言者可以市於衆尊其行者可以加於人况道之微妙玄奧無所不可善人得以為寶不善人得其所保如之何善則貴之不善則棄之也老氏以至慈為心故舉而歎之夫不善之人何棄之有乎所以立天子置三公正以教不善者耳若善則貴之不善則棄之則不善之人無復遷於自新之善長見棄於世矣又安用天子三公之教化哉由是言之雖奉其合拱之璧先以駟馬之乘徒遑遑而求賢才不如安坐而進於此道也然則自古及今所以貴此道者何哉不日求之必可得有罪可以免耶何為其然夫道在近而人求諸逺則不可得矣故求道不逺在知其反能反諸身心則求而斯得矣豈非求之必可得乎然人之所以多罪惡者以不知道也苟能知道之體得道之用則解紛挫鋭攻堅勝強而人莫與爭物莫能害豈非有罪可以免乎故記曰道也者不可須臾離可離非道也自非若此之善又安足以為天下之至貴哉經為無為事無事味無味大小多少報怨以德傳夫體道之士微妙玄通應世之為而本無為應時之事而本無事應物之味而本無味其體雖大而朴甚小其用雖多而要甚少其術在於淡泊清靜不為萬物所撓耳夫唯如此則無欲無欲則無私矣夫恩者私之所畜怨者恩之所萌唯聖人能無私無私故無私恩無私恩故無私怨衆人則不然以其有私故有恩怨然則天下有怨聖人以德德之人之不善聖人以善善之故民用和睦而上下無怨矣以德報怨此之謂乎記所謂寬身之仁者蓋以衆人言之耳仲尼曰行滿天下無怨惡曾謂聖人而有怨於物者乎經圖難於其易為大於其細天下難事必作於易天下大事必作於細是以聖人終不為大故能成其大夫輕諾必寡信多易必多難是以聖人猶難之故終無難矣傳夫樞機之發天下之至易也及其動天地天下之至難也誠明之至天下之至細也及其致悠久天下之至大也故欲動天地者必以愼言為要將致悠久者必以致曲為本秉要執本而天下之理得矣皆始於易者小者而成乎難者大者是以聖人終不為大而能成其大也夫輕於然諾者必寡於期信由始多容易則終多艱難故與其有諾責也寧有己怨與其言浮於行不若行浮於言如此者雖聖人猶難之而况於衆人乎夫唯其始不易是以其終無難故始不輕諾則終不寡信必然之理可不勉乎經其安易持其未兆易謀其脆易破其微易散為之於未有治之於未亂合抱之木生於毫末九層之臺起於纍土千里之行始於足下傳天下尚安則易持其盈家國已危則難定其傾姦心未兆則易謀消滅惡狀已形則難圖泯絶糵芽尚脆則其患易破枝幹既成則其禍難挫悔吝尚微則其憂易散凶咎既彰則其孽難逭故聖人為之於未有則其惡不萌治之於未亂則其害不生是以聖人之治無知無欲見其機愼其微使百姓日用而不知若不豫為之防早為之治其猶植木始於毫末足可搔而絶及其合抱以至於不可伐築臺起於纍土足可蹶而圮及其九層以至於不可毁逺行始於足下足可踵而旋及其千里以至於不可還易曰履霜堅冰至此之謂也經為者敗之執者失之是以聖人無為故無敗無執故無失民之從事常於幾成而敗之愼終如始則無敗事是以聖人欲不欲不貴難得之貨學不學復衆人之所過以輔萬物之自然而不敢為傳夫位者聖人之大寶國者天下之神器神器者不可取而為之取而為之者必敗大寶者不可執而有之執而有之者必失故聖人之享天下也樂推而不厭故無所取為無所取為故無敗聖人之據大寶也功成而不居故無所執有無所執有故無失凡民之情則好於有為有為則多事多事故有敗故其從事於世也常於垂成而敗之何為其然不愼其始故也苟能愼其始慮其終則莫若於少欲少欲則少事少事則無敗以其愼之於始則能終無敗事本其愼始之心故使愼終如始所以兩舉敗與無敗者以明凡聖之相逺然則衆人之所欲者貨色也所不欲者清靜也聖人則欲其所不欲是以不貴難得之貨衆人之所學者事迹也所不學者無為也聖人則學其所不學所以反衆人之所過厚其所以然者將以輔萬物之自然耳故不敢為不敢執是以能無敗無失也經古之善為道者非以明民將以愚之民之難理以其智多故以智治國國之賊不以智治國國之福知此兩者亦楷式常知楷式是謂玄德玄德深矣遠矣與物反矣然後乃至大順傳夫古之善為道以治天下者非以發民聰明使益其巧智也將以塗民耳目使反於愚拙也是何也夫民之所以難治者以其多智也若又發其聰明則智益多而巧愈甚故所務塞其兊閉其門使無知無欲而已苟發其聰明則姦詐漸作姦詐既作則必為法令以禁制之法出而姦愈生令下而詐愈起以至刑罰不足畏其意殺戮不能服其心於是乎天下大亂此民以智知國之賊害也苟能塗其耳目則姦偽不生而亂賊不作民躋富壽之域斯乃天下之福此民不智知國之福善也能知民以智知國之為賊則絀聰明以愚之能知民不以智知國之為福則敦朴厚以鎮之是乃稽古之法式能知稽古之法式則是玄妙之常德常德深遠與物俱反然後天下各復其性以至於大順矣經江海所以能為百谷王者以其善下之故能為百谷王是以聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不害是以天下樂推而不厭以其不爭故天下莫能與之爭傳易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙之為德卑以自牧故江海以謙為德而為百谷所歸往聖人以謙為德故為天下所先上聖人豈欲先上哉天下樂推而不厭耳所以言欲先上者舉聖人以勸衆人耳然則聖人之處先上者豈爭而得之耶書曰汝唯不爭故天下莫與汝爭能汝唯不矜故天下莫與汝爭功此之謂也經天下皆謂我道大似不肖夫唯大故似不肖若肖久矣其細也夫我有三寶保而持之一曰慈二曰儉三曰不敢為天下先夫慈故能勇儉故能廣不敢為天下先故能成器長今捨其慈且勇捨其儉且廣捨其後且先死矣夫慈以戰則正以守則固天將救之以慈衛之傳天下皆以老氏道德廣大不顯明智似乎不肖之人老氏自以為唯我道至大故能似彼不肖若使人世以為肖則吾道之細也久矣又安得稱為大哉傳所謂寧武子其智可及其愚不可及蓋近之矣然吾道雖似不肖而其所寶可三保而持之可以為治則慈與儉不敢為天下先是矣夫慈愍於物者必能勇於拯救所謂仁者必有勇也儉約於用者必能廣於振施所謂節用而愛人也不敢先於天下則必能成器用之長所謂用九見群龍無首吉也今世之所謂肖者則不然捨其慈愍而苟為勇義以陷物則過涉滅頂矣捨其儉約而苟為廣施以費用則傷財害民矣捨所以後其身而苟欲先於天下則犯上作亂矣夫如此者皆不合於道自取滅亡者也然此三寶最以慈為貴夫慈於物則憂愛之矣愛人者人亦愛之憂人者人亦憂之人憂之則助之故以陳則行列自正人愛之則保之故以守則城池自固是知天將救斯人也必以慈愛賦之人有慈愛則陳必正守必固是以慈愛為衛也易曰自天佑之吉無不利此之謂也天將棄斯人也則必以凶德厚之人有凶德則陳必亂守必亡是以凶德為蹶也語曰天厚其惡惡厚將崩此之謂也經善為士者不武善戰者不怒善勝敵者不爭善用人者為之下是謂不爭之德是謂用人之力是謂配天古之極也傳善治士卒者慈以愛人不先犯物故不為剛武善於戰鬬者唱而後應不好凌敵故不至威怒善於勝敵者不以利動因勢而取故不為先舉善於用人者卑身損己與下者齒故常為之下用師則以和而克故為不爭之德使民則悅以犯難故為用人之力如此者所謂天道自然其間無巧乃可以克配上帝乃古者之至極經用兵有言吾不敢為主而為客不敢進寸而退尺是謂行無行攘無臂執無兵仍無敵禍莫大於輕敵輕敵則幾喪吾寶故抗兵相加哀者勝矣傳老氏痛當世用兵以好殺為本故舉古之軍志以明不得已之徵夫用師之法為主者以起戎為謀為客者以應敵是務進雖少漸近於殺退雖多轉近於生故不敢為主而為客不敢進寸而退尺猶勇於敢則殺勇於不敢則活也故將前趾於順行則若無行可列將奮臂而先登則若無臂可奮將操其兵則若無兵將引其敵則若無敵常以慈愛為本不樂殺人人感其慈愛爭為之用若手之救頭若子之救父卒至無敵於天下夫無敵於天下者是戰而勝也戰而勝者必多殺人多殺人者莫大之禍夫如此則近於喪吾所寶之慈矣既多殺人不慈甚矣而曰幾亡吾寶者何也我本以慈愛不樂殺人不得已而至無敵非吾志也既非本志則為喪矣猶未大失故曰幾亡由此言之則舉兵相加若勝負未定者能愛其民則必全其勝矣何者夫愛其民者必哀其死民知君之哀民之死必反哀君之亡故相率用命以致其勝始以愛民為本終以哀死致勝故曰哀者勝焉經吾言甚易知甚易行天下莫能知莫能行言有宗事有君夫唯無知是以不吾知也知我者希則我者貴是以聖人被褐懷玉傳老氏言吾所言之言必有物故甚易行而天下之人昏於欲故莫之能行然吾所行之事必有君君謂理也夫唯天下之人無能知此者是以不知我也若夫微妙玄通深不可識則知我者希矣夫唯人所不識而我獨能有之則在我者貴矣是以聖人被褐以晦其外懷玉以貞其內經所謂質真若渝此之謂也經知不知尚矣不知知病矣夫唯病病是以不病聖人不病以其病病是以不病傳明白四達若不知者其知尚矣不知此明白四達者其知病矣夫唯能病其所病是以其病不能病聖人所以不為知所病者以其能病其知之病是以其知不能病也經民不畏威則大威至矣無狎其所居無厭其所生夫唯不厭是以不厭是以聖人自知不自見自愛不自貴故去彼取此傳易曰小人不見利不勸不威不懲小懲而大戒此小人之福也故曰履校滅趾無咎小人以小惡為無損而弗去故惡積不可掩罪大不可解故曰荷校滅耳凶此民不畏威則大威至之謂也夫小人之所以不畏威而弗去惡者心之過也大威至而不可解者身之禍也聖人則不然知其心所以去其過愛其身所以畏其禍故能養其生而全其形矣夫心者神之所常居也無以嗜欲褻之則不狎矣神者形之所以生也無以多事勞之則不厭矣夫唯人不厭神是以神不厭人則所謂知其心有過則去之不自見能養其生也自愛其身有禍則畏之不自貴能全其形也若貴能全其形若見能養其生是教民以非道養生非理全形矣故去彼見貴取此知愛經勇於敢則殺勇於不敢則活此兩者或利或害天之所惡孰知其故是以聖人猶難之天之道不爭而善勝不言而善應不召而自來繟然而善謀天網恢恢疏而不失傳勇於果敢殺之道也勇於不果敢生之道也此兩者俱勇而所施各異勇於敢則害物之命勇於不敢則利物之生然則天之所惡其勇敢乎其強梁乎勇敢者殺物強梁者殺己誰知天惡勇敢強梁者之故能以巽順柔弱為用乎書曰高明柔克故天以柔弱為德也何以明之天不與萬物爭而萬物自伏此善勝也不與百姓言而百姓自信此善應也不與四時期而四時自至此自來也雖有三德不為物先然而垂象見吉凶知之於未兆福善禍淫不差毫髮可謂善謀者矣故天之禁網雖恢恢然疏緩而反道敗德者未嘗失之書曰為善天降之百祥為不善天降之百殃此之謂也經民常不畏死奈何以死懼之若使人常畏死而為奇者吾得執而殺之孰敢常有司殺者殺而代司殺者殺是代大匠斫夫代大匠斫希有不傷其手矣傳天下之民常為利欲所陷雖之於死而猶不止如之何當世之君作為嚴刑酷法趨欲以死懼之哉若使民常懼死吾得奇邪者殺戮之則人當誰敢更為奇者今雖得殺之而為者不已則知民不畏死亦已眀矣然則作為嚴刑酷法既不可以威衆則天下有罪者宜付之於至當故聖人法天明威以制五刑主至當之刑謂之司殺者書曰天討有罪五刑五用哉故刑期無刑惟刑之恤若世主不使司殺者以至當之理議讞罪人而苟任其情自專殺戮是猶代大匠斫朴矣夫不善於斫而苟以代人則必齾斤析指而功用不就則所謂希有不傷其手者矣故管仲曰人君修官上之道而不言其中故人君下及官中之事則有司不任無代馬走無代鳥飛此之謂也經民之飢以其上食稅之多是以飢民之難治以其上之有為是以難治民之輕死以其求生之厚是以輕死夫唯無以生為者是賢於貴生也傳古者公田籍而不稅後世什一而稅亦天下之中也今之在上取民食稅之多則民不得不飢矣古之在上者無為無欲是以其民少事各遂其性今也其上有為有欲是以其民多事不得安其生故至於難以致治也民之生也蓋有常理不可厚也苟厚其生必過於理過理生生必得其死是以輕至於死由於生生夫唯無以其生為生者是以外其身而身存也外其身而身存則賢於貴其生者逺矣經人之生也柔弱其死也堅強萬物草木之生也柔脆其死也枯稿故堅強者死之徒柔弱者生之徒是以兵強則不勝木強則共強大處下柔弱處上傳夫生則柔弱死則堅強人與萬物同歸於此是以聖人守柔弱惡堅強故兵強於衆則諸侯共加其國矣木強於幹則枝葉共生其上矣故強幹大本常處於下柔條弱枝常處於上木猶如此況於人乎況於國乎經天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之天之道損有餘而補不足人之道則不然損不足而奉有餘孰能以有餘而奉於天下其唯有道者乎是以聖人為而不恃成功而不居其不欲見賢耶傳易曰立天之道曰陰與陽陽主升陰主降陽升極天則降陰降極地則升此則抑高舉下蓋張弓之象也天道盈虛一章七閏損日之有餘補月之不足人道則不然損其不足之民而奉有餘之君孰能法天之道以為人道損己之有餘以奉天下之不足其唯有道之士乎在易損下益上曰損損上益下曰益以下為本也是以聖人能為之而不恃其事能成功而不居其所以其不欲見賢於人故天下謂之似不肖皆損有餘奉不足之旨也經天下柔弱莫過於水而攻堅強者莫之能勝其無以易之故柔之勝剛弱之勝強天下莫不知莫能行故聖人言受國之垢是謂社稷主受國不祥是為天下王故正言若反傳夫溜之細可以穿石是用其柔弱無物可以易之則知柔弱勝剛強其理明矣天下莫不明知其如此而莫能效而行之故老氏舉聖人之言以勸之蓋亦三墳之遺文也能受國之垢汙乃可為社稷之主能受國之不善乃可為天下之王斯言甚正而觀之若反傳曰山澤納汙國君含垢蓋近之矣經和大怨必有餘怨安可以為善是以聖人執左契而不責於人故有德司契無德司徹敬與轍同天道無親常與善人傳夫上下相親民則無怨民之不親大怨作矣雖能和之其傷不復既有餘怨安足以為善哉必也使無怨乎古者結繩為約而民不欺破木為契而民不違何者聖人無常心以百姓心為心故聖人之心與百姓心猶左右契耳契來則合而不責於人故上下相親怨用不作後世不能執左契以應物而守常徹以軌民用此求和必有餘怨是知有德之君則司心契以無怨斯得善矣無德之君則司徹迹以和怨安足以為善乎夫天道無所私唯善人是與猶聖人執左契唯以與物為心也經小國寡民使民有什伯之器而不用使民重死而不遠徙雖有舟輿無所乘之雖有甲兵無所陳之使民復結繩而用之甘其食美其服安其居樂其俗鄰國相望雞犬之聲相聞民至老死不相往來傳夫小國寡民勢不足以自存者使有道蒞之猶能使民雖有什伯之器終不用之於戎事故民樂其生而重其死安乎土而不轉徙不逺交以求援故雖有舟輿無所乘不近攻以取利故雖有甲兵無所陳上下相安幽明不欺使民復結繩之約用之而不違嗜欲甚寡故甘其糲食美其儉服征稅甚薄故安其常居興其淳俗與國比鄰相望於逺近雞嗚犬吠相聞於都鄙如此其密邇也然而無欲無求各得其所有以至老死而不相往來者治之極也老氏所以陳道德之教其志於此乎經信言不美美言不信善者不辨辨者不善知者不博博者不知聖人無積既以為人己愈有既以與人己愈多天之道利而不害聖人之道為而不爭傳信實之言不必美者以其質也美好之言不必信者以其華也善於心者不必辨本乎朴也辨於口者不必善貴乎言也知其要者不必博少則得也博於事者不必知多則惑也聖人唯善是與而無私利故無所藴積盡以善為人而己得善斯愈有也盡以利與人而己得利斯愈多也天之道春夏生之畜之秋冬成之熟之是利而不害聖人之道順物之理而不與物爭蓋法天而然也道德真經傳卷之四
