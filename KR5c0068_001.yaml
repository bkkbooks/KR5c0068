front:
  text: 道德真經傳卷之一
  hash: sha256:58e67d8a1c65748d5b190e205064527e769521a5d116a76ebea09c22a7e299ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0068_HFL_001-001a, image: hfl/0368/0368-010.png}
body:
  text: 吳郡陸希聲傳經道可道非常道名可名非常名無名天地之始有名萬物之母故常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之玄玄之又玄衆妙之門傳夫道者體也名者用也夫用因體生而體本無用名因道立而道本無名體本無用則用無不可故曰可道所可道者以體當用耳以體當用是物之理非道之常故曰非常道也道本無名則名無不可故曰可名所可名者以名求體也夫以名求體是物之變非名之常故曰非常名也始所謂道者常道名者常名非可道之道可名之名何則常道常名不可道不可名唯知體用之説乃可玄通其極耳然則體道者皇順物之理也用名者帝適物之變也順理適變而下及其上者王故上得之為神中得之為聖下得之為哲偏得之為賢才無所得為衆人所謂無名者道之體動靜之先也有名者道之用善惡之元也體為名本故能離動靜原之則天地之始也名因用立故能生善惡極之則萬物之母也故皇者守無名而帝者行有名守無名故無為而無不為行有名故為之而無以為皇者順物之理因其無欲而守以清靜故曰常無欲以觀其妙妙謂靜以照理微妙玄通者也帝者適物之變因其有欲而行以節文故曰常有欲以觀其徼徼謂動以照事殊塗同歸者也所謂此兩者言始與母也即無名有名之術也同於體而異於用者也玄也者事理俱照者也能知夫無名之術微妙玄通有名之術殊塗同歸靜以制變動以歸根動靜不殊則事理玄會矣夫事理玄會則物不能纍故退藏於密吉凶與民同患鼓天下不與聖人同憂斯至神之賾也出則為衆入則為妙未有不由斯道也經天下皆知美之為美斯惡已皆知善之為善斯不善已故有無之相生難易之相成長短之相形高下之相傾音聲之相和前後之相隨是以聖人處無為之事行不言之教萬物作而不辭生而不有為而不恃功成不居夫唯不居是以不去傳夫人之所謂美惡皆生於情以適情為美逆情為惡以至善不善亦然然所美者未必美所惡者未必惡所善者未必善所不善者未必不善如此者何情使然也夫人之性大同而其情則異以殊異之情外感於物是以好惡相繆美惡無主將何以正之哉在乎復性而已向則情之所生必由於性故聖人化情復性而至乎大同所謂有無之相生者情性也情性之相因猶難易之相成也夫為治者以情亂性則難成以性正情則易成所謂長短之相形者美惡也美惡之相奪猶高下之相傾也所謂音聲之相和者善不善也善不善之相資猶先後之相隨也於平世之多故由此六者天下所以不治萬物莫得遂性聖人將復其性先化其情善者因己善不善者吾亦因而善之使善信者因己信不信者吾亦因而信之使信故用無棄物教無棄人使在物無惡在人無不善而天下不治者未之有也易曰其道甚大百物不廢此之謂也是以聖人體無名則無為而事自定用有名則不言而教自行使萬物各遂其性若無使之然者如天地之生萬物而不有其用如百工之為器用而不恃其成如四時之成歲功而不居其所夫唯如此是以其道可常其名不去也經不尚賢使民不爭不貴難得之貨使民不為盜不見可欲使心不亂是以聖人之治虛其心實其腹弱其志強其骨常使民無知無欲使夫知者不敢為也為無為則無不治矣傳夫情所貴尚則物徇其欲徇則生偽偽則生姦故尚賢則爭奪之心萌貴貨則盜賊之機作夫唯以性正情者不見貴尚之欲從事於道而無姦偽之心故聖人之治人也散有餘之貨所以虛貪盜之欲心糞甚蕪之田所以實飢民之腹胃不尚爭能之賢以弱其志意不勞兵役之力以強其筋骨常使天下之民無知於知無欲於欲雖有知其貴尚者亦不果於所行以兵不敢為也為無為者用有名而體無名則天下莫不臻於治矣經道沖而用之或不盈淵兮似萬物之宗挫其鋭解其紛和其光同其塵湛兮似或存吾不知其誰之子象帝之先傳道以真精為體沖虛為用天下歸之未嘗盈滿萬物宗之淵深不測得其用則可以挫俗情之鋒鋭解世故之糾紛得其體則可以上和光而不皎下同塵而不昧雖湛兮不可得窺而綿綿乎若存故前稱或似而後言似或吾終不能知其所始象若先天地而生焉經天地不仁以萬物為芻狗聖人不仁以百姓為芻狗天地之間其猶橐籥乎虛而不屈動而愈出多言數窮不如守中傳萬物資天地而生天地無取於萬物也百姓仰聖人而治聖人無假於百姓也猶芻狗因神明而成神明無用於芻狗也夫唯無用則無私無私則無恩是以天地無恩而大恩生聖人不仁而大仁成故百姓不辭德於聖人萬物不謝生於天地何以知其然哉吾觀天地之間猶橐籥之無心也橐籥無心故其聲不屈其氣愈出天地無心故生成而不息故為治不至多言多言而無敬則動而數窮矣未若處無為之事行不言之教此為抱道之實保生之質乃守中之術也經谷神不死是謂玄牝玄牝之門是謂天地之根綿綿若存用之不勤傳谷者象道之體神者况道之用體真用妙應物不窮故曰谷神不死夫唯谷神不死則可以盡天地之體用玄者天之體也牝者地之用也體玄而用牝聖人之術也故曰是謂玄牝焉夫玄牝之術乃陰陽開闔變化不側者也開闔即陰陽之道陰陽乃乾坤之本故曰玄牝之門是謂天地之根綿綿乎不知所終極其體而不亡其用不勞此謂王法地地法天天法道道法自然者也經天長地久天地所以能長且久者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私耶故能成其私傳天地生萬物而不自生故能長存不毁恆久不已聖人養百姓而不自養故其教長久與天地相似是以不敢為天下先則樂推而不厭不敢有其身則殁身而不殆誠以其不私於身而後能有天下也經上善若水水善利萬物而不爭處衆人之所惡故幾於道居善地心善淵與善仁言善信政善冶事善能動善時夫唯不爭故無尤傳從道之人無所不善故謂之上善夫水常處汙下不與物爭故萬物莫不得其利蓋近於道矣故上善之人若此水德其居世若水之在地其用心若水之淵回其施與若水之潤澤其言語若水之信實其為政若水之清靜其行事若水之任器其變動若水之應時夫唯常處汙下故人莫得而挫夫唯不與物爭故物莫與之爭易曰謙者德之柄水得之矣經持而盈之不如其已揣而鋭之不可長保金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道傳持大器而滿盈雖懼之不如早止居大位而亢極雖憂之不如早退揣勢利而鋭意雖得之不可求保貪金玉而滿堂雖有之莫能長守貴而驕則得其禍富而驕則益其過驕生乎心咎自於己豈可怨天尤人乎故有道之士功成不居名遂不留退身以全其歸讓位以免其危若四時之運寒暑代謝而萬物以成豈非天之道乎經載營魄抱一能無離乎專氣制柔能如嬰兒乎滌除玄覽能無疵乎愛民治國能無為乎天門開闔能為雌乎明白四達能無知乎生之畜之生而不有為而不恃長而不宰是謂玄德傳載猶夫也發語之端也夫魄者生之始一者道之子營其始抱其子則神與形不相離矣專其沖和之用致其柔靜之志則性與氣如嬰兒矣洗心遺照何思何慮則道與德無疵病矣愛民如赤子治國如小鮮人各自正則可以無為矣順天應變一闔一闢物當自化則可以守雌矣道不昏昧德乃旁行百姓注其耳目聖人皆孩之則可以無知矣上三者可以修身下三者可以治國所謂修之身其德乃真修之天下其德乃溥夫如此乎乃可以生成萬物畜養百姓矣唯能生之而不執有能為之而不矜恃能長之而不宰制則道之用被於物深矣故謂之玄德經三十輻共一轂當其無有車之用埏埴以為器當其無有器之用鑿户牖以為室當其無有室之用故有之以為利無之以為用傳夫形而上者謂之道形而下者謂之器道者以無為其用器者以有為其利然則有之所利利於無無之所用用於有故車有輻轂以象天室有户牖以象地車室之所以全其利常在於空虛之處耳豈非天地之間其猶橐籥之謂平至於蜒埴以為器實資於水火而後利用之理可得而言猶聖人成器長必本於道德而後教化之術可得而行也是以蜒埴之器象之於人處乎天地之間以明道器之際也經五色令人目盲五音令人耳聾五味令人口爽馳騁畋獵令人心發狂難得之貨令人行妨是以聖人為腹不為目故去彼取此傳目不覩無體之禮謂之盲耳不聞無聲之樂謂之聾口不食大道之味謂之爽此三病之所生皆以五色五音五味之所惑惑於外則迷於內故聖人病之聖人所以不病以其病病耳於乎欲之盛者莫大於禽荒作之則心若病狂貨之重者莫甚於滿堂守之則行有所妨將去其行妨則如勿多藏將治其狂病惟克念作聖是以為腹則知止足不為目則不見可欲故去彼大惑取此玄德經寵辱若驚貴大患若身何謂寵辱寵為下得之若驚失之若驚是謂寵辱若驚何謂貴大患若身吾所以有大患者為吾有身及吾無身吾有何患故貴以身為天下若可寄天下愛以身為天下若可託天下傳寵辱者榮悴之恆情若驚者得失之常心也夫道德充於內則外物不能移故寵辱之來心未嘗動斯士之上也如內不自得外感於物情存乎寵辱得失皆若驚此其次也以心之所動異於震驚故謂之若耳夫高必以下為基辱必以寵為本故辱之與寵猶響之尋聲福兮禍所伏寵兮辱所倚聲發則響應寵至則辱隨俗情趨末則驚辱而不驚寵道心觀本故驚寵而甚於辱故曰寵為下者言寵為辱本所以偏可驚也始言寵辱若驚猶似齊至後獨以寵為下而得失若驚者明以驚寵為本也且大患者吉凶之事有身者大患之本是以執有其身則有大患故知貴其身者乃貴大患也嘻貴彼大患惑已甚矣語常情之迷復猶未及於貴身故言貴患若身譏其貴身之甚也夫世之所謂吉者富貴慶賞也常患於失之世之所謂凶者貧賤刑罰也常患於得之患得之患失之則憂之矣故天下之憂患莫大於吉凶聖人以百姓心為心故亦以吉凶為憂患然憂患之本皆由於身世人孰有我身不冥於物群分類聚愛惡相攻吉凶既生憂患斯作至人體道無己與物皆宜和光同塵長而不宰故雖與民同患不與聖人同憂若夫以得失動其心物我存乎懷則寵辱不暫寧吉凶未嘗息安足為天下之正居域中之大乎唯能貴用其身為天下愛用其身為天下者是貴愛天下非貴愛其身也夫如此則得失不在己憂患不為身似可以大位寄託之猶不敢使為之主而况據而有之哉此大道之行公天下之意也經視之不見名曰夷聽之不聞名曰希搏之不得名曰微此三者不可致詰故混而為一其上不皎其下不昧繩繩兮不可名復歸於無物是謂無狀之狀無物之象是謂惚恍迎之不見其首隨之不見其後執古之道以御今之有能知古始是謂道紀傳視之可見者色也聽之可聞者聲也搏之可得者形也天地萬物皆有之唯道在天地萬物之間非色聲與形故不可以耳目手足得然以非形能形形色色而聲聲故強名之曰希夷微而復非詰責之可得則混此三者謂之為一上有日月齊照而其光不皎下與瓦礫同寂而其明不昧繩繩然運行不絶不可得而名之雖千變萬化復歸於無物然道體真精本非無物但不可以視聽搏執而得耳故謂之無質之狀無形之象言其狀則忽然若無言其象則恍然若有莫知其始故迎之不見其首莫知其終故隨之不見其後唯能執古無為之道御今有為之名者乃可以遺淳反朴復於太古之初矣能知太古之初淳朴之性斯乃大道之綱紀教化之都要也經古之善為士者微妙玄通深不可識夫唯不可識故強為之容豫若冬涉川猶若畏四鄰儼若客涣若冰將釋敦兮其若朴曠兮其若谷渾兮其若濁孰能濁以靜之徐清孰能安以動之徐生保此道者不欲盈夫唯不盈故能弊不新成傳夫德用微妙道體玄通以其深隱難知是以強為之象其進也豫然若涉川之無涯其止也猶然若畏鄰之有知其肅也儼然若賔主之在觀其舒也涣然若春冰之方泮其質敦兮若材之尚朴其器曠兮若山之有谷其心渾兮若水之處濁斯皆善為士者道德之形容故衆人莫得而識也孰能從世俗之混濁而澄靜之使其流徐清乎孰能即世俗之宴安而發動之使其教徐生乎唯能深識玄妙消息盈虛者乃可以保持此道合天之行耳夫唯其德不盈其道不傾從其濁而致其清即其安而觀其生者然後可因弊而能致治不必取新而後化成也經致虛極守靜篤萬物並作吾以觀其復夫物藝藝各歸其根歸根曰靜靜曰復命復命曰常知常曰明不知常妄作凶知常容容乃公公乃王王乃天天乃道道乃久殁身不殆傳致虛玄而妙極者有德之用也守靜專而篤實者得道之體也其用無方故萬物並作其體湛然以觀其復雷在地中者天地之復也動在靜中者聖人之復也復其見天地之心乎天地以聖人心為心也故凡物藝藝復則歸于根庶事靡靡復則歸于理理者事之源也靜者動之君也性者情之根也夫人生而靜天之性感物而動人之情情復于性動復于靜則天理得矣易曰窮理盡性以至於命故能窮天之理則能盡人之性能盡人之性則能知天之命故曰歸根曰靜靜曰復命也自天命而觀之則萬物之性可見矣故曰天命之謂性性命之極謂之至賾然則性命之理由賾而生也故能率其性則入於賾矣賾可以通理通理之謂道能修其道則復於性矣可以接物接物之謂教故曰率性之謂道修道之謂教然則繼可傳之教者在於善成可常之道者在乎性至賾之體深不可識仁智則滯於所見百姓則用而不知故體道君子蓋亦希矣故曰繼之者善也成之者性也仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉此仲尼極言道德之奧性命之賾也夫道之所以為常者以其善應萬物而萬物不能纍也唯能知道之常則能常善救物而不為萬物所纍其用也微其理也彰故能知其常則謂之襲明矣不知救物之善道乃欲妄作於法教者則天下之民斯被其害矣唯能知夫常道明於善救則如天地之覆載無所私於萬物故百姓歸而往之推而戴之乃可以合道之常而終身無吝也經太上下知有之其次親之譽之其次畏之侮之信不足有不信猶其貴言功成事遂百姓謂我自然傳太古有德之君無為無迹故下民知有其上而已謂帝力何有於我哉德既下衰仁義為治天下被其仁故親之懷其義故譽之仁義不足以治其心則以刑法為政故百姓畏之刑法不足以制其意則以權譎為事故衆庶侮之於乎心之有孚謂之誠言之可復謂之信誠既不孚言則不復而猶貴重爽言謂之誠信可乎哉道德既隱仁義乃彰仁義不行刑法斯作而猶尊尚末術謂之道德可乎哉聖人則不然執古御今斫雕為朴功成而不執事遂而無為有法無法因時為業使百姓咸遂其性皆曰我自然而然則親譽畏侮之心皆不生於世矣經大道廢焉有仁義智慧出焉有大偽六親不和有孝慈國家昏亂有忠臣傳夫老氏之指執古御今故辨其必然之理蓋不得已而為之者後世不能通其意乃謂不合於仲尼在此與後章也於乎老氏之受誣久矣吾今乃闡而明之記不云乎大道之行也人不獨親其親不獨子其子貨惡其棄於地不必藏於己力惡其不出諸身不必為己故姦謀不興亂賊不作外户不閉是謂大同當此時也鑿井而飲耕田而食日出而作日入而息帝何力於我哉下知有之而已豈容行仁義於其間哉大道既隱人各親其親各子其子貨力為己仁義為治以正君臣以篤父子以睦兄弟以和夫婦百姓親而譽之而仁義始彰矣由此言之朴散為器豈非大道廢焉有仁義耶是以仲尼興歎於䄍賔老氏垂文於道論其指一也夫聖人智周萬物而不以飾行慧利天下而不以示義方此之時人未知為智慧也逺世下衰爭奪滋生用智以行其姦用慧以賊其義然後智慧之術顯而姦偽之迹匿矣豈非智慧出焉有大偽耶是以兩觀之誅少正卯春秋之書楚子虔然則仲尼之意與老氏何異至若父子之道天性也率天之性薰然大和父子相親孰知慈孝及為外物所誘性化為情情生而物或間之則有離其天性者矣聖人修道為教以順天下使父子交相愛而孝慈之名顯矣故曰六親不和有孝慈是以瞽叟頑而舜稱大孝曾晳嚴而參稱能養斯必然之理也豈老氏非之哉至如飛龍在天賢人在位股肱元首無所間然乃其君昏於上民亂於下然後亡身徇國之節著拂心逆耳之言發故曰國家昏亂有忠臣是以夏癸立而龍逄彰殷辛亡而比千顯斯不得已而為之者又豈老氏非之耶學者能統會其旨則孔老之術不相悖矣經絶聖棄智民利百倍絶仁棄義民復孝慈絶巧棄利盜賊無有此三者以為文不足故令有所屬見素抱朴少私寡欲傳夫聖智所以利物而物有因利受害者則反責於聖智故或者乃謂絶而棄之則可以利百倍矣仁義所以和民而民有因和得怨者則顧尤於仁義故或者復謂放而棄之則可以和六親矣巧利所以資人而人有因資致盜者則歸過於巧利故或者又謂絶而棄之則可息攘矣夫利害之相生猶形影之相隨自然之理不可滅也或者覩世俗衰漸之事不能達弊不新成之始則謂絶而棄之乃可以復於古始是猶惡影者不知處陰而止遂欲滅去其形也老氏病世人迷道已久舉或者過差之論皆謂文教不足以致治遂欲絶而棄之故特云此三者以為然明非老氏之指也我則不然聖智者成器之長也仁義者群倫之美也巧利者工用之善也苟其事將弊吾必因而救之所謂弊不新成常善救物之道也陳救之道故令有所屬在乎濁以靜之徐清安以動之徐生蓋因而變之漸而化之即見素抱朴少私寡欲是矣於乎夫能見素抱朴則木訥而近仁矣少私寡欲則質直而好義矣自此以反其漸可知老氏之術焉有不合於仲尼者且此章之末在少私寡欲耳然則絶仁棄義豈老氏之指哉經絶學無憂唯之與阿相去幾何善之與惡相去何若人之所畏不可不畏荒兮其未央哉衆人熙熙若享太牢如登春臺我獨怕兮其未兆如嬰兒之未孩儽儽兮若不足似無所歸衆人皆有餘而我獨若遺我愚人之心也哉純純兮俗人昭昭我獨若昏俗人察察我獨悶悶淡兮其若海飂兮似無所止衆人皆有以我獨頑似鄙我獨異於人而貴食母傳此章之深旨與前章略同夫聖人之學所以為道道勝則世治俗人之學所以為利利勝則世亂或者惡俗學之亂世因謂絶之則無憂遂使墻面之徒因此莫能知道老氏舉其宗要而論其失得且曰夫人之應對均以一言言唯則人謂之恭言阿則人謂之慢然以慢為恭言不加多而不能以阿為唯遂為失禮之對亦猶世之學者均於為學學道則世以為善學利則世以為惡以利為道反念則是而不能以惡為善遂為亂世之事耳夫唯之與阿相較詎幾而善之與惡相遠何如今於至易之理可致至難之事而不能反而行之此老氏所以興歎也故歷陳世俗之所失正以有道之所得焉夫刑法之威世人所常畏也雖有道之士亦安得不畏之哉何則世教既衰禍亂方作淫刑以逞將及善人荒乎未央吁可畏也夫爵賞之慶世人所熙喜也得其欲也如列鼎而饗太牢遂其志也如登臺以望春物彼有道之士亦安得辭之但得之泊然無所喜若赤子之未孩笑也處之儽儽然如不足若喪家而無所歸也夫世俗之人尚於智力常若有所餘焉而有道之士復於愚弱常若有所遺焉夫豈如冥頑之人心無所知哉乃其性純粹而不尚智耳夫世俗之人以昭昭然自顯為明而有道之士獨昏昏然以晦用為德世俗之人以察察然知姦為能而有道之士獨悶悶然以知常為道是以其靜也淡淡然若海之不可測其動也飂飂然若風之無所息衆人有為莫不有所以我獨無為似乎頑且鄙故衆皆逐於末所愛哺其子我獨反於本所貴養其母耳夫所謂母者道也子者一也愛哺其子者以嗜欲資其神貴養其母者以清靜歸於道也道德真經傳卷之一
