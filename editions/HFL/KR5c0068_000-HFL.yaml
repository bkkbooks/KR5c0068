body:
  text: 道德眞經傳序必一序曰大道隱世教衰天下方大亂當是時天必生聖人聖人憂斯民之不底于治而扶衰救亂之術作周之末世其幾矣於是仲尼闡五代之文以扶其衰老氏據三皇之質以救其亂其揆一也蓋仲尼之術興於文文以治情老氏之術本於質質以復性性情之極聖人所不能異文質之變萬世不能一也易曰顯諸仁以文爲教之謂也文之爲教其事彰故坦然明白坦然明白則雅言者詳矣易曰藏諸用以質爲教之謂也質之爲教其理微故深不可識深不可識則妄作者衆矣夫唯老氏之術道以爲體名以爲用無爲無不爲而格于皇極者也楊朱宗老氏之體失於不及以至於貴身賤物莊周述老氏之用失於太過故務欲絶聖棄智申韓失老氏之名而弊於苛繳刻急王何失老氏之道而流於虚無放誕此六子者皆老氏之罪人也而世因謂老氏之指其歸不合於仲尼故訾其名則曰搥提仁義絶滅禮學病其道則曰獨任清虚何以爲治於乎世之迷其來遠矣是使老氏受誣於千載道德不行於當世良有以也且老氏本原天地之始歷陳古今之變先明道德次說仁義下陳禮樂之失刑政之煩語其馴致而然耳其秉要執本在乎情性之極故其道始於身心形於家國以施于天下如此其備也而或者尚多云云豈不謂厚誣哉昔伏羲畫八卦象萬物窮性命之理順道德之和老氏亦先天地本陰陽推性命之極原道德之奥此與伏羲同其元也文王觀大易九六之動貴剛尚變而要之以中老氏亦察大易七八之正致柔守靜而統之以大此與文王通其宗也孔子祖述堯舜憲章文武導斯民以仁義之教老氏亦擬議伏羲彌綸黄帝冒天下以道德之化此與夫子合其權也此三君子者聖人之極也老氏皆變而通之反而合之研至變之機探至精之賾斯可謂至神者矣而王弼以爲聖人與道合體老氏未能體道故阮籍謂之上賢亞聖之人蓋同於輔嗣豈以老氏經世之迹未足充其所言耶斯不然也於乎聖人之在世也有有迹有無迹故道之不行也或俛身歷聘以天下爲其憂或藏名飛遯示世故不能累有跡無迹殊途同歸斯實道義之門非徒相反而已然則仲尼之所以出老氏之所以處老氏之所以默仲尼之所以語蓋屈伸隱顯之極也二子安能識之哉司馬遷統序衆家以道德爲首可謂知本末矣班固作古今人表乃絀老氏於第三品雖其名可詘而道可貶乎哉於戲老氏之術見棄於當代乆矣斯數子者之由也且仲尼親見老氏歎其道曰猶龍乎從之問禮無間然著在記傳後世不能通其意是以異端之說紛然蓋述之者不窮其源故非之者不盡其致噫斯傳之不作則老氏之指或幾乎息矣今故極其致顯其微使昭昭然與群聖人意相合有能體其道用其名執古以御今致治如反掌耳自昔言老氏術者獨太史公近之爲治少得其道唯漢文耳其他詖辭詭說皆不足取吴郡陸希聲序
