body:
  text: 吴郡陸希聲傳經上德不德是以有德下德不失德是以无德上德無爲而無以爲下德爲之而有以爲上仁爲之而無以爲上義爲之而有以爲上禮爲之而莫之應則攘臂而仍之故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首前識者道之華而愚之始是以大丈夫處其厚不處其薄居其實不居其華故去彼取此傳上德合道不以德稱無以而爲故有常德下德失道而同於德有以而爲故無常德上德之用法乎自然故無以爲而無爲也下德之用法乎無爲故有以爲而爲之也夫仁者兼愛皆有爲而爲能無以仁爲功者上也義者禁非亦有爲而爲能有以義爲利者上也何則若以仁爲功則滯於爲仁矣若不以義爲利則徇於非義矣夫禮之上者所以辨上下定民志至於陳玉帛尚往來斯禮之末節也今禮敬於人人未之答彼誠失禮之微者我乃艴然變色奮肱而引之則失禮復甚於彼矣夫禮所以防爭失之於末則反以起爭斯乃世俗之常情不達禮之大本故也老氏舉其失禮之甚譏其起爭之由將使人反禮之本復歸於太一者耳記曰愛人而不親則反其仁禮人而不答則反其敬故克己復禮而不尤於人易曰謙以制禮又曰謙德之柄苟能執謙之柄復禮之始則指撝而無不利安有攘仍之失哉且上德無爲自然合道失於上德法乎無爲故曰失道而後德耳夫法乎無爲德業著矣有爲而爲仁功見矣裁而利之上義明矣制而防之上禮立矣故曰失德而後仁失仁而後義失義而後禮也夫失於彼者得於此此天下之常理也故忠信之質衰於中而禍亂之機兆則制禮以防其亂故禮居亂之首大道之華發於外而愚昩之情或則崇智以導其愚故智爲愚之始也前識者智也智爲先見之眀而照於未形之理者也然則仁義禮智皆聖人適時之用所以與世汙隆隨時升降者耳故執古御今則以道德爲之本禮智爲之末化今復古則以禮制爲其始道德爲其終所謂損之又損之以至於無爲者也夫豢豕爲酒非以爲禍而酒之流禍生焉仁義禮智非以爲亂而治之弊亂至焉惑者不知利欲之爲亂乃欲歸罪聖智因謂絶而棄之則可以復於上古之治一何過哉一何過哉故曰論禮於淳樸之代非狂則悖忘禮於澆漓之日非愚則誣在於尋流還源去末歸本正禮義以反仁德用有名而體無名則自然之道不逺而復矣所謂大丈夫者且將斷此而不疑安處於道德之本不滯於禮智之末者耳何爲其然乎作法於治其弊猶亂作法於亂弊將若何故去彼華薄取此厚實斯乃執古御今之深㫖也於乎禮亦有之祭天一獻貴質也器用陶匏貴素也明酒之用而玄酒之尚筦簞之安而藁秸之設皆貴本也安可忽之哉經昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以爲天下貞其致之一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貞而貴高將恐蹶故貴必以賤爲本高必以下爲基是以侯王自謂孤寡不穀此其以賤爲本也非乎故致數輿無輿不欲琭琭如玉珞珞如石傳夫一者道之子物之始也能抱其子復其始則萬物莫不遂其生之理矣雖天道之與神明地道之與山谷莫不以得一之故而能清靈寧盈耳易曰天下之動貞夫一故侯王得之則爲天下貞所以致之其道一也然唯其致之不可恃之故戒其無以此爲也苟恃其清靈寧盈則必將裂發歇竭矣於乎萬物恃其生天理必滅侯王恃其貞貴高必蹶特加貴高之言將戒侯王之深㫖也亦旣戒之而又演之曰其所以得貴爲王侯必以賤者爲根本也其所以高居大位必以下民爲基址也至於孤寡不穀皆下賤之稱也而侯王以此自稱者此以下賤爲本之謂也窮極其致何以明之夫士農工商具於民然後有國焉輪轅箱軸備於用然後有輿焉今指輿而數之則皆輪轅箱軸耳不見有輿也指國而數之則士農工商耳不見有國也然則士農工商國之賤下者也國之所以存以賤下爲本耳故侯王當以貴自戒不欲琭琭然如玉之貴異當以賤下爲本故宜珞珞然如石之凡賤也經反者道之動弱者道之用天下之物生於有有生於無傳夫權也者以反爲動而合於正者也實也者以弱爲用而制於强者也天下之物皆生於有形有形之物必生於無形天下之事皆生於有兆有兆之事必生於無兆故知反之爲動必生於弱之爲用則動微之幾必生於靜冥之理然則幾生於理終歸於理權生於實終反於實此皆道之通變覆却相濟者也經上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道建言有之明道若昧進道若退夷道若類上德若谷大白若辱廣德若不足建德若偷質眞若渝大方無隅大器晚成大音希聲大象無形道隱無名夫唯道善貸且成傳易曰形而上者謂之道道也者通乎形外者也形而下者謂之器器也者止乎形内者也上士知微知彰通乎形外故聞道而信則勤行之中士在微彰之際處道器之間故聞道而疑信相半故若存若亡下士知彰而不知微止乎形内故聞道則大笑之不唯笑之且將非之矣夫道也者微妙玄通深不可識苟不爲下士所非笑則不足以爲眞精之道矣然則爲下士所非笑者豈不以立言有云乎夫體道者與曰月合其貞明而其光不耀斯明道若昩也與天地合其易簡而其用不可爲典要斯夷道若纇也與四時合其運行而其動必反於玄妙斯進道若退也常處卑下而終不可渝斯上德若谷也常居溷濁而終不可涅斯大白若辱也衣被天下而不有其仁斯廣德若不足也生畜萬物而不顯其功斯建德若偷也復其性以御其情斯質眞若渝也正乎内而行乎外斯大方無隅也以若拙之匠陶甄天下而不爲近功斯大器晚成也以不言之教鼓動萬物而不事小說斯大音希聲也事無事莫覩其用斯大象無形也爲無爲莫識其體斯道隱無名也夫唯善濟貸於萬物而不責其報是以萬物受其生成而不知其德故下士聞此道而笑之不信其能若此耳經道生一一生二二生三三生萬物萬物負陰而抱陽冲炁以爲和人之所惡唯孤寡不穀而王公以自稱故物或損之而益或益之而損人之所教亦我義教之强梁者不得其死吾將以爲教父天下之至柔馳騁天下之至堅無有入於無間吾是以知無爲之有益不言之教無爲之益天下希及之傳夫眞精之體生妙物之用炁形旣具萬物生焉夫陰陽相交而爲冲炁冲炁運化而成萬物然萬物之生也莫不背陰而向陽冲炁行其中所以和順其生理也聖人立教之指必原夫天地之道窮萬物之理然後知人之生也亦以冲炁爲主焉何以明之夫人受天地之中以生所謂命也其始有精爽謂之魂魄魄者陰也魂者陽也陰陽化淳而冲和之炁行乎其間所以成形神也故冲和之炁全則神與形相得神與形相得則爲生冲和之炁散則神與形相離神與形相離則爲死死者不可復生散者不可復全故必能養其浩然之炁然後可以合於自然之道易不云乎天地之大德曰生生也者蓋聖人之所重也聖人之所以重其生者何將以行道也道也者域中之所尊也雖大包天地細入毫芒要而言之在於身心而已是以爲道之人務治身心之要治身心之要在處衆人之所惡然則孤寡不穀皆衆人之所惡而王公自以爲稱者將以損身心之强梁而求益於道德者也在易損之爲善莫善於懲忿窒慾懲忿窒慾則其心日明其心日明則可以益於理矣爲益之美莫美於遷善改過遷善改過則其身日正其身日正則可以損其事矣所謂物或損之而益或益之而損也夫人之所以教教人日益我亦教人教人日損故損之又損之以至於無爲也夫道以柔弱爲用不與物爭故物莫能與之爭所謂不損益之者也强梁者以暴害物物亦害之故不得盡其生理所謂莫益之或擊之也吾知彼强梁爲萬物所惡故以此柔弱爲衆教之父何以明之夫水以至柔爲用而穿於石之至堅炁以無形爲體而入於物之無間是知有爲之教本於事以剛健爲主無爲之教本於理以柔順爲先吾見水之攻至堅炁之入無間是以知無爲之有益有爲之有損也夫行多言之教滯有爲之事則有爲之有損也行不言之教通無爲之理則無爲之有益也多言之教有爲之損舉天下皆是也不言之教無爲之益則天下希及之於乎知我者希則我者貴信矣經名與身孰親身與貨孰多得與亡孰病是故甚愛必大費多藏必厚亡知足不辱知止不殆可以長乆傳夫名者立身之表也有其實則身見尊於當時名亦揚於後世苟以矯激爲之不足施於事實則名雖聞人身必棄於有道矣貨者發身之資也得所用則身以好施見重貨不爲己而積苟以貪冒得之不能散於仁惠則貨雖滿堂身必薄於有德矣得竊名黷貨之譏而亡其修身約己之道二者孰爲病乎故甚愛名者必生僞則大傷其實矣多藏貨者必招盜則厚失其資矣故知足則不貪貨知止則不貪名不貪貨則不辱不貪名則不殆夫唯如此則其名可以長有其貨可以乆守矣經大成若缺其用不弊大盈若冲其用不窮大直若屈大巧若拙大辯若訥躁勝寒靜勝熱清靜爲天下正傳夫聖人道濟天下而猶慮一物不得其所則成衆務而不弊矣德充四海而不敢介然自矜於懷則應萬機而不窮矣行至易之道而不徑庭因自成之器而不雕鎸陳至當之理而不文飾夫如此則物遂其性人盡其能天下之事不勞而自定矣究其所以然者皆自然而勝耳猶躁作者勝祁寒靜正者勝祁暑非有心於寒暑而寒暑不能侵之故我無爲而民自化我好靜而民自正天下之動貞夫一故清靜可以爲天下正也經天下有道却走馬以糞天下無道戎馬生於郊罪莫大於可欲禍莫大於不知足咎莫大於欲得故知足之足常足矣傳夫天下有道之世天子則守在四夷諸侯則守在鄰國雖有甲兵無所用雖有健馬無所乘百姓順其教化復於農桑闢污萊以藝樹糞田疇而播殖故民咸安其土而敦其親矣天下無道之時天子則外攘四夷諸侯則外侵鄰國故兵甲動於境内戎馬馳於四郊百姓困於力役失其本業桑梓盡於樵薪荆棘生於隴畝民咸去其鄉而叛其君矣於乎無道之君毒痛天下原其所以其惡有三心見可欲非理而求故罪莫大焉求而不已必害於人故禍莫大焉欲而必得其心愈熾故咎莫重焉然自非聖人不能無欲欲則不能無求求而不知足禍之甚者也於乎未有多求而多得之者故求而知足者其求必寡則易供故其求常足矣經不出户而知天下不窺牖而見天道其出彌遠其知彌少是以聖人不行而知不見而名不爲而成傳夫聖人之爲治也必推其身心以及於天下故當食而恩天下之饑當衣而思天下之寒愛其親以及天下之老愛其子以及天下之幼夫如此不俟出户而天下可知矣夫聖人之治也必反諸身心以合於天道故己好生則知天道之生萬物也己成務則知天道之成四時也己樂善則知天道之與善人也天以懸象示其道聖人亦以身心合於道又安用窺牖而後見天道哉夫不能反推於身心而囂囂然自以天下爲己任勞其神苦其形孜孜矻矻有爲於天下之事者吾見其不能爲治矣何者夫天下之事一日萬機不能秉要執本而務治其末則形神勞矣夫神大勞則竭形大勞則弊形神俱勞則危殆及之矣徒勤勞於末流竟不得其萬一是以其出彌逺其知彌少故記曰欲治天下先治其國欲治其國先治其家欲治其家先治其身欲治其身先治其心欲治其心先誠其意故君子不誠無物皆反推於身心之謂也夫不行天下而能察知人情不見天象而能名命天道則不爲勤勞之事而能成乎至治反推身心故也孔子曰唯天爲大唯堯則之又曰無爲而治者其舜也歟此之謂也經爲學曰益爲道日損損之又損之以至於無爲無爲而無不爲取天下常以無事及其有事不足以取天下傳夫爲學者博聞多識以通於理故日益爲道者秉要執本以簡於事故日損夫理明則事定故學之日益實資道之日損也夫濁於亂政靜之可以徐清故損之在漸不可頓去則損之又損之也安於弊俗動之可以徐生故損之至乎無爲則能無不爲矣夫有爲者縁人情而作之法制故有事有事則民勞民勞則叛之無爲者因物性而輔之自然故無事無事則民逸民逸則歸之夫聖人之心常慮一物失其所將欲救弊亂之要在於取天下人之心取天下人之心在使其自來歸之耳故爲無爲事無事俗化清靜則民皆樂推而不厭若有爲有事政煩民勞則百姓望而畏之故不足以取天下之心也經聖人無常心以百姓心爲心善者吾善之不善者吾亦善之得善矣信者吾信之不信者吾亦信之得信矣聖人在天下惵惵爲天下渾其心百姓皆注其耳目聖人皆孩之傳聖人體道無爲物感則應應其所感故無常心然百姓之心常欲安其生而遂其性聖人常使人人得其所欲豈非以百姓心爲心乎苟百姓有好善之心聖人亦應之以好善其本善者吾因以善輔之苟有不善之心吾亦因而善待之使感吾善亦化而爲善則天下無不善百姓皆得所欲之善矣至於百姓有好信之者吾亦以此化之則百姓皆得所欲之信而天下無不信矣故聖人在天下惵惵然應於物感未嘗少息而其心渾然與天下爲一未嘗自有所爲故仲尼之所絶者有四謂毋意毋必毋固毋我是以能無可無不可無爲無不爲故百姓皆注其耳目於聖人若嬰兒之仰慈母聖人視之唯恐其傷也經出生入死生之徒十有三死之徒十有三人之生動之死地亦十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地傳夫生必有死理之常也達生死之理則能安其常苟違其常則越於生理越於生理則陷於死地必矣然則知生有常理不違理以存其生者十中有三人耳知死亦常理不違理以避其死者十中亦三人耳若乃愛其生違理而存之則反失惡其死違理而避之則反得者亦如之何爲其然求生之厚越於生理是以動而乖常則之於死地故善攝生者則不然知生有常理則守道抱德而不厚其生知死亦常理則樂天知命而不憂其死生死不能動其心患難不能奪其志則陸行遇摯獸而不驚入軍冒白刃而不讋雖處患難與不遇同何以致其然耶有心害物物亦害之有信及物物亦信之我無心害物故兕虎無所投其爪角有信及人故甲兵無所容其鋒刃是知生理不存於中則死地不見於前仲尼曰忠信則水火可蹈蓋近之矣經道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴夫莫之爵而常自然故道生之畜之長之育之亭之毒之養之覆之生而不有爲而不恃長而不宰是謂玄德傳夫物生而後畜畜而後形形而後成其所由生者道也其所以畜者德也形其材者事也成其用者勢也萬物以能生故尊道以能畜故貴德道德以生畜之故自然爲萬物所仰豈有授之爵位而後見尊貴哉然道者眞精之體德者妙物之用體可以兼用用不可以兼體道可以兼德德不可以兼道故禀其精謂之生含其炁謂之畜遂其形謂之長字其材謂之育權其成謂之亭量其用謂之毒保其和謂之養護其傷謂之覆此之謂大道旣生之而不執有旣爲之而不矜恃旣長之而不宰制此之謂玄德營魄章言人同於道德今此章言道德同於人是以其辭同而其理通也經天下有始以爲天下母旣得其母以知其子旣知其子復守其母殁身不殆傳天下萬物固有所始始天下者其唯無名乎天下萬物固有所生生萬物者其唯有名乎然則無名爲天下之始有名爲萬物之母夫無名有名存乎體用用因體生故復以無名爲有名之母也故曰天下有始以爲天下母即道生一也夫一爲道之子道爲一之母道謂眞精之體一謂妙物之用旣得其體以知其用旣得其用復守其體體用冥一應感不窮然後可以無爲而治故能殁身不殆也經塞其兊閉其門終身不勤開其兊濟其事終身不救見小曰明守柔曰强用其光復歸其明無遺身殃是謂襲常傳兊者嗜慾所之生也門者云爲之所由也以性正情則嗜慾之原塞矣以理正事則云爲之路閉矣夫如此然後可以無爲無不爲故終身不復勞也開其源而弗塞則長其嗜欲之情通其路而弗閉則濟其云爲之事如此則形神俱勞終身不可救矣知塞兊閉門之術是見於微小也挫嗜慾之銳解云爲之紛是守其柔弱也守柔弱則物不能加可謂强矣見微小則事不能昏可謂明矣明者内景謂體也光者外照謂用也出應於事反歸於理是以用歸體故曰用其光復歸其明也以用歸體則與道合道用柔弱嗜慾不生故能馳騁云爲而不爲萬物所害若嗜慾不除强梁於事事煩則害理是自貽其災殃故能以見微守柔爲用即是密用眞常也經使我介然有知行於大道唯施是畏大道甚夷而民好徑朝甚除田甚蕪倉甚虚服文彩帶利劍饜飲食資貨有餘是謂盜夸非道也哉傳老氏言若吾囂然略無知道之心始欲希於當世則唯所行之爲務務其苟合於當世也使我介然微有知常之明方將行於大道則唯所施而是畏畏其不合於大道也夫大道之云猶亨衢也亨衢平易無往不達以其大直不患小迂而世人欲速由於捷徑是以崎嶇迷惑不達所趨故聖人病之愼所施教畏其導民於邪路終不合於大道焉噫入其國其政教可知也觀朝闕甚修除墻宇甚雕峻則知其君好土木之功多嬉遊之娯矣觀田野甚荒蕪則知其君好力役奪民時矣觀倉廪甚空虚則知其君好末作廢本業矣觀衣服多文彩則知其君好淫巧蠹女工矣觀佩帶皆利劍則知其君好武勇生國患矣觀飲食常饜飫則知其君好醉飽忘民事矣觀資貨常有餘則知其君好聚歛困民財矣凡此數者皆盜用民力以爲夸毗故謂之盜夸盜夸者非有道之治也然則盜用之云陰取之而民不知也所謂唯施是畏其在此乎經善建者不拔善抱者不脱子孫祭祀不輟修之身其德乃眞修之家其德乃餘修之鄉其德乃長修之國其德乃豐修之天下其德乃普故以身觀身以家觀家以鄉觀鄉以國觀國以天下觀天下吾何以知天下之然哉以此傳善建者以道鎮國本則深根固蔕而不可挺拔善抱者以德懷民心則無繩約而不可解脱夫如此則子孫享祚長乆故祖宗祭祀無輟絶也故脩道於身則其德用淳眞修道於家則其德行有餘修道於鄉則其德教乆長脩道於國則其德化豐大修道於天下則其德施周普故以治身之道反觀吾身心身心能體於道則德乃眞矣以治家之道反觀吾家人家人能睦於親則德有餘矣以治鄉之道反觀吾鄉黨鄉黨能信於友則德乃長矣以治國之道反觀吾國民國民能遂其生則德乃豐矣以治天下之道反觀吾天下之人天下之人能無欲則德乃普矣吾何以知天下國家以及身心之然哉以此反觀之乃知耳易曰觀我生觀民也其是之謂乎經含德之厚比於赤子毒蟲不螫猛獸不據攫鳥不搏骨弱筋柔而握固未知牝牡之合而䘒作精之至終日號而不嗄和之至知和曰常知常曰明益生曰祥心使炁曰强物壯則老是謂不道不道早已傳夫至人性含淳厚情無嗜欲泊然未兆有如赤子赤子者無心害物物亦無心害之故蜂蠆虺蛇經之而不蠹螫攫鳥猛獸遇之而不搏據雖筋骨至弱而拳握甚固雖情慾未萌而陽德自作雖終日啼呼而聲無嘶嗄皆以純精不散和炁常存故能至此耳至人之德神矣又何以異於此乎故能知嬰兒之和柔而法之乃德之常也能知和柔爲常德而用之乃心之明也夫生爲常理德之大也能順常理福之首也苟厚其生而益其福旣失常理必致凶災故益生曰祥也志能動炁炁能動志以心任炁炁盛心强故心使炁曰强也夫物之壯者必至於老心之强者必至於暴道以柔弱爲用故强壯者謂之不道知其不道則可早已易曰不遠復無祇悔此之謂也經知者不言言者不知塞其兊閉其門挫其銳解其紛和其光同其塵是謂玄同故不可得而親亦不可得而疏不可得而利亦不可得而害不可得而貴亦不可得而賤故爲天下貴傳知道者以心而不以辯譚道者以辯而不以心故大丈夫去彼辯說取此心悟塞其嗜慾之端閉其云爲之路挫俗情之鋒銳解世故之紛糺上和光而不皦下同塵而不昩是謂微妙玄通與物大同者也上交於道而不謟故不可得而親暱下交於器而不瀆故亦不可得而疏隔澹泊無欲故不可得而利誘卑順不爭故亦不可得而陷害處上而不重故不可得而貴寵處卑而不汙故不可得而鄙賤道德自尊非人使然此所以爲天下之至貴經以正治國以奇用兵以無事取天下吾何以知其然哉夫天下多忌諱而民彌貧民多利器國家滋昏民多智慧邪事滋起法令滋彰盜賊多有故聖人云我無爲而民自化我無事而民自富我好靜而民自正我無欲而民自樸傳夫正名則不濫可以治國矣奇謀則不窮可以用兵矣二者纔足救患而已非可乆可大者也將欲可乆可大者莫過於取天下之心夫唯取天下之心莫過於無事及其有事則不足以取天下之心矣吾何以知其如此哉夫天下有事則多其禁忌避諱將以治萬民也萬民以其有事不得安其業故彌貧百姓有欲則多其利用器具將以助國家也而國家以其有欲不得靜其治故滋昏民多智慧欲以防狡猾狡猾益有以欺之故邪事滋起法令滋彰欲以防姦宄姦宄愈得以取之故盜賊多有此皆不塞其源而務壅其流故其弊愈益而不可止旣此有事不足以取天下人之心是知唯無事者則可以取天下之心矣故老氏舉聖人之言云者以示不敢自專其所舉之言蓋三墳之文也老氏爲周柱下史遍觀上世之遺書故舉其言以證其必然耳傳序云彌綸黄帝蓋此類也我無爲則人遂其生故其俗自化我無事則民復其業故其家自富我好靜則人保天眞之性故其事自正我無欲則人絶夸企之情故其質自樸苟有事有欲而望致民於富壽之域吾未見其可也經其政悶悶其民淳淳其政察察其民缺缺禍兮福所倚福兮禍所伏孰知其極其無正耶正復爲奇善復爲妖民迷其日固以乆矣是以聖人方而不割廉而不劌直而不肆光而不耀傳夫有道之君悶悶然以寬大含容爲政民皆樂其生而遂其性故淳淳然歸於樸厚無德之君察察然以聰明苛急爲政民皆失其業而喪其本故缺缺然至於凋弊則悶悶之政世人爲之慢政而其民實樂察察之政世人謂之能政而其民實弊亦猶世之所謂禍者莫不畏惡之以其畏惡之則福立其中矣世之所謂福者莫不喜好之以其喜好之則禍藏其間矣雖禍福相因莫知所極考其善惡豈無正耶夫政寬民淳可謂正道禍中生福可謂善訓而世人之迷其日固乆知正道而不遵反爲奇衺聞善訓而不信復爲妖孽斯至人之所歎也是以聖人以大方爲德而無所割正以至廉爲行而無所劌傷以大直爲心而無所肆訐以天光爲用而無所炫曜此所謂悶悶之政豈同於察察之治乎道德眞經傳卷之三
